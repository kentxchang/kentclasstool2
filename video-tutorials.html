<html lang="zh-Hant">

    <meta name="description" content="阿剛老師剛好系列課堂互動整合大禮包的教學影片中心，依功能主題分段學習，快速找到需要的操作教學。">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Anime.js for premium micro-animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

    <style>
        :root {
            --ink: #0f172a;
            --muted: #475569;
        }
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Varela Round', 'Noto Sans TC', sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 12% 12%, rgba(251, 113, 133, 0.15), transparent 30rem),
                radial-gradient(circle at 88% 18%, rgba(139, 92, 246, 0.15), transparent 28rem),
                radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.08), transparent 35rem),
                linear-gradient(135deg, #f8fafc 0%, #eff6ff 50%, #faf5ff 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .hero-grid {
            background-image:
                linear-gradient(rgba(15, 23, 42, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(15, 23, 42, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.08);
        }
        .text-gradient {
            background: linear-gradient(135deg, #3b82f6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .text-gradient-purple {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Tab styles */
        .tool-tab {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tool-tab:hover:not([aria-selected="true"]) {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 20px -10px rgba(15, 23, 42, 0.1);
        }
        .tool-tab[aria-selected="true"] {
            color: white;
            box-shadow: 0 12px 25px -5px rgba(139, 92, 246, 0.4);
            transform: translateY(-2px);
        }
        /* Episode card styles */
        .episode-card {
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .episode-card:hover {
            transform: translateY(-4px) scale(1.005);
            box-shadow: 0 20px 30px -10px rgba(15, 23, 42, 0.08);
            border-color: rgba(139, 92, 246, 0.3);
        }
        .video-link {
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.2s;
        }
        .video-link:not([href="#"]):hover {
            transform: scale(1.15);
        }
        /* Badge Animation */
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.85; transform: scale(0.97); }
        }
        .animate-pulse-slow {
            animation: pulse-slow 3s ease-in-out infinite;
        }
        @media print {
            body {
                background: white;
            }
            .no-print {
                display: none !important;
            }
            .episode-card {
                break-inside: avoid;
                box-shadow: none;
            }

</head>

    </header>

                    { title: "學生作答畫面與送出規則", focus: "學生登入、作答、檢查送出後狀態。", videoUrl: "https://youtu.be/XZ0eblBnBTw" },
                    { title: "成績分佈與題目正確率分析", focus: "查看總分、分佈圖、單題正確率與常見錯誤。", videoUrl: "https://youtu.be/JgDkUsXe1no" },
                    { title: "匯出 Wordwall、Kahoot 與 CSV", focus: "選擇匯出格式，說明適合使用的後續平台。", videoUrl: "https://youtu.be/4hk6T64hALI" },
                    { title: "複製題庫、結束測驗與資料維護", focus: "複製再利用、結束測驗、整理長期題庫。", videoUrl: "https://youtu.be/pE2OX-qoJ3Q" }
                ]
            }
        ];

        const tabContainer = document.getElementById("toolTabs");
        const introContainer = document.getElementById("toolIntro");
        const sharedFirebaseInfo = document.getElementById("sharedFirebaseInfo");
        const episodesContainer = document.getElementById("episodes");
        const episodeCount = document.getElementById("episodeCount");
        const totalEpisodesEl = document.getElementById("totalEpisodes");
        const emptyState = document.getElementById("emptyState");
        const searchQuery = document.getElementById("searchQuery");
        const clearSearchBtn = document.getElementById("clearSearch");

        const sharedFirebaseToolIds = new Set(["classtools_basic", "classtools_advanced"]);
        let currentToolId = tutorialModules[0].id;
        let activeQuery = "";

        // Number count-up animation
        function animateCount(el, targetValue) {
            if (!el) return;
            const obj = { value: 0 };
            anime({
                targets: obj,
                value: targetValue,
                round: 1,
                easing: 'easeOutExpo',
                duration: 1500,
                update: function() {
                    el.textContent = obj.value;
                }
            });
        }

        // Card Domino Stagger entrance animation
        function animateEpisodesEntrance() {
            const cards = document.querySelectorAll('.episode-card');
            cards.forEach(c => c.style.opacity = '0');
            anime({
                targets: '.episode-card',
                opacity: [0, 1],
                translateY: [20, 0],
                delay: anime.stagger(40),
                easing: 'easeOutQuad',
                duration: 400
            });
        }

        function renderTabs() {
            tabContainer.innerHTML = tutorialModules.map((tool) => {
                const isActive = tool.id === currentToolId;
                return `
                    <button
                        type="button"
                        class="tool-tab rounded-2xl px-5 py-4 text-left font-black text-slate-700 border border-slate-200/60 transition-all flex items-center justify-between group ${isActive ? 'bg-gradient-to-r text-white border-transparent' : 'bg-white shadow-sm'}"
                        style="${isActive ? `background: linear-gradient(135deg, ${tool.color}, #f43f5e)` : ''}"
                        aria-selected="${isActive}"
                        data-tool="${tool.id}">
                        <span class="flex items-center gap-3">
                            <span class="inline-flex h-10 w-10 items-center justify-center rounded-xl transition-all ${isActive ? 'bg-white/20 text-white' : `${tool.tint} ${tool.text} group-hover:scale-105`}">
                                <i class="fa-solid ${tool.icon}"></i>
                            </span>
                            <span>
                                <span class="block text-sm md:text-base">${tool.name}</span>
                                <span class="block text-xxs md:text-xs font-bold ${isActive ? 'text-white/80' : 'text-slate-400'}">${tool.episodes.length} 段影片</span>
                            </span>
                        </span>
                        <i class="fa-solid fa-chevron-right text-xs opacity-0 group-hover:opacity-100 transition-opacity ${isActive ? 'text-white' : 'text-slate-400'}"></i>
                    </button>
                `;
            }).join("");

            document.querySelectorAll(".tool-tab").forEach((button) => {
                button.addEventListener("click", () => {
                    currentToolId = button.dataset.tool;
                    renderPage();
                    // Clear search on tab switch
                    searchQuery.value = "";
                    activeQuery = "";
                    clearSearchBtn.classList.add("hidden");
                });
            });
        }

        function renderIntro(tool) {
            introContainer.innerHTML = `
                <div class="grid md:grid-cols-[auto_1fr_auto] gap-6 items-center">
                    <div class="h-20 w-20 rounded-3xl ${tool.tint} ${tool.text} flex items-center justify-center text-4xl shadow-inner">
                        <i class="fa-solid ${tool.icon}"></i>
                    </div>
                    <div>
                        <p class="text-xs font-black ${tool.text} uppercase tracking-wider mb-1">教學群組：${tool.name}</p>
                        <h2 class="text-2xl md:text-3xl font-black text-slate-800 leading-snug">${tool.intro}</h2>
                        <p class="mt-2 text-slate-500 leading-relaxed text-sm md:text-base">${tool.goal}</p>
                    </div>
                    <a href="${tool.file}" target="_blank" class="no-print inline-flex items-center justify-center gap-2 rounded-full px-6 py-3 text-white font-black shadow-lg transform hover:scale-[1.03] transition duration-200" style="background: linear-gradient(135deg, ${tool.color}, #f43f5e)">
                        開啟主程式
                        <i class="fa-solid fa-arrow-up-right-from-square text-xs"></i>
                    </a>
                </div>
            `;
        }

        function renderSharedFirebaseInfo(tool) {
            if (!sharedFirebaseToolIds.has(tool.id)) {
                sharedFirebaseInfo.classList.add("hidden");
                sharedFirebaseInfo.innerHTML = "";
                return;
            }

            sharedFirebaseInfo.classList.remove("hidden");
            sharedFirebaseInfo.innerHTML = `
                <div class="grid lg:grid-cols-[auto_1fr] gap-6 items-start">
                    <div class="h-16 w-16 rounded-2xl bg-emerald-100 text-emerald-600 flex items-center justify-center text-3xl shadow-sm">
                        <i class="fa-solid fa-database"></i>
                    </div>
                    <div class="w-full">
                        <p class="inline-flex items-center gap-2 rounded-full bg-emerald-50 px-3 py-1 text-xs font-black text-emerald-700 mb-3">
                            <i class="fa-solid fa-link"></i>
                            通用專案 Firebase 設定說明
                        </p>
                        <h2 class="text-xl md:text-2xl font-black text-slate-800">課堂互動、白板與簡報全面整合成單一專案</h2>
                        <p class="mt-3 text-sm md:text-base text-slate-500 leading-relaxed">
                            由於「剛好白板」與「剛好簡報」皆已無縫嵌入「剛好學」的程式頁面中，因此<strong>它們共用同一個 Firebase 通用專案</strong>。您只需在剛好學的主頁設定一次 Firebase Config，白板與簡報即可直接使用，無需重覆設定！
                        </p>
                        <div class="mt-5 grid md:grid-cols-3 gap-4">
                            <div class="rounded-2xl bg-white p-5 border border-emerald-100 shadow-sm">
                                <div class="font-black text-emerald-700 text-sm mb-1">1. 設定一次</div>
                                <p class="text-xs text-slate-500 leading-relaxed">在剛好學右上角的「Firebase 設定」填入通用設定值，系統將自動套用。</p>
                            </div>
                            <div class="rounded-2xl bg-white p-5 border border-emerald-100 shadow-sm">
                                <div class="font-black text-emerald-700 text-sm mb-1">2. 本地儲存</div>
                                <p class="text-xs text-slate-500 leading-relaxed">設定會安全存放在瀏覽器的 localStorage，只要網址不變即可自動登入。</p>
                            </div>
                            <div class="rounded-2xl bg-white p-5 border border-slate-100 shadow-sm">
                                <div class="font-black text-slate-700 text-sm mb-1">3. 剛好測分開</div>
                                <p class="text-xs text-slate-400 leading-relaxed font-medium">剛好測因保存大量題庫與學生歷史成績，必須單獨申請並使用獨立專案。</p>
                            </div>
                        </div>

                        <div class="mt-5 rounded-2xl bg-white p-4 border border-emerald-100 shadow-sm">
                            <div class="flex flex-wrap items-center justify-between gap-4">
                                <div class="flex items-center gap-3">
                                    <div class="h-10 w-10 rounded-xl bg-red-50 text-red-500 flex items-center justify-center text-lg">
                                        <i class="fa-brands fa-youtube"></i>
                                    </div>
                                    <div>
                                        <div class="font-bold text-sm text-slate-800">Firebase 註冊與設定教學影片</div>
                                        <p class="text-xs text-slate-500 mt-0.5">點擊按鈕開啟新視窗，跟著步驟完成專案建置。</p>
                                    </div>
                                </div>
                                <a href="https://youtu.be/puKmTMhZ760" target="_blank" rel="noopener noreferrer"
                                   class="no-print inline-flex items-center gap-2 rounded-full bg-slate-900 px-4 py-2 text-xs font-black text-white hover:bg-slate-800 transition shadow-sm">
                                    觀看教學
                                    <i class="fa-solid fa-arrow-up-right-from-square text-xxs"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderEpisodes(tool) {
            // Filter episodes based on active query
            const filteredEpisodes = tool.episodes.map((ep, idx) => ({ ...ep, originalIndex: idx })).filter(episode => {
                if (!activeQuery) return true;
                const query = activeQuery.toLowerCase();
                return episode.title.toLowerCase().includes(query) || episode.focus.toLowerCase().includes(query);
            });

            if (filteredEpisodes.length === 0) {
                episodesContainer.innerHTML = "";
                emptyState.classList.remove("hidden");
                episodeCount.textContent = `共 0 段`;
                return;
            }

            emptyState.classList.add("hidden");
            episodeCount.textContent = activeQuery 
                ? `搜尋結果：共 ${filteredEpisodes.length} 段`
                : `共 ${tool.episodes.length} 段，每段約 3-5 分鐘`;

            episodesContainer.innerHTML = filteredEpisodes.map((episode) => {
                const hasVideo = episode.videoUrl && episode.videoUrl.trim().length > 0;
                const href = hasVideo ? episode.videoUrl : "#";
                const title = hasVideo ? "開啟 Youtube 觀看" : "錄製計畫中，敬請期待";
                const indexDisplay = String(episode.originalIndex + 1).padStart(2, "0");
                
                return `
                    <article class="episode-card rounded-2xl bg-white/90 border border-slate-100 p-5 flex flex-col md:flex-row md:items-center justify-between gap-4 shadow-sm relative overflow-hidden">
                        <!-- Top left border decoration -->
                        <div class="absolute left-0 top-0 bottom-0 w-1.5" style="background: ${tool.color}"></div>
                        
                        <div class="flex gap-4 items-start flex-grow pl-2">
                            <div class="h-10 w-10 md:h-12 md:w-12 rounded-xl flex items-center justify-center text-white font-black text-sm md:text-base shadow-sm shrink-0" style="background: linear-gradient(135deg, ${tool.color}, #f43f5e)">
                                ${indexDisplay}
                            </div>
                            <div class="min-w-0">
                                <div class="flex flex-wrap items-center gap-2 mb-1.5">
                                    <span class="rounded-full ${tool.tint} ${tool.text} px-2.5 py-0.5 text-xxs font-black">3-5 分鐘</span>
                                    <span class="rounded-full bg-slate-100 text-slate-500 px-2.5 py-0.5 text-xxs font-bold">主題 ${indexDisplay}</span>
                                    ${hasVideo ? '<span class="rounded-full bg-emerald-50 text-emerald-600 px-2.5 py-0.5 text-xxs font-black flex items-center gap-1"><i class="fa-solid fa-check"></i> 可播放</span>' : '<span class="rounded-full bg-slate-100 text-slate-400 px-2.5 py-0.5 text-xxs font-bold">規畫中</span>'}
                                </div>
                                <h3 class="text-lg md:text-xl font-black text-slate-800 leading-snug">${episode.title}</h3>
                                <p class="mt-1.5 text-xs md:text-sm text-slate-500 leading-relaxed font-medium">${episode.focus}</p>
                            </div>
                        </div>

                        <div class="flex items-center justify-end shrink-0 pl-14 md:pl-0">
                            <a class="video-link w-10 h-10 md:w-12 md:h-12 rounded-full inline-flex items-center justify-center shadow-md ${hasVideo ? 'text-white cursor-pointer' : 'bg-slate-100 text-slate-400 cursor-default'}"
                               style="${hasVideo ? `background: linear-gradient(135deg, ${tool.color}, #f43f5e)` : ''}"
                               href="${href}"
                               target="${hasVideo ? '_blank' : '_self'}"
                               rel="noopener noreferrer"
                               title="${title}"
                               aria-label="${title}">
                                <i class="fa-solid ${hasVideo ? 'fa-circle-play' : 'fa-video'} text-xl"></i>
                            </a>
                        </div>
                    </article>
                `;
            }).join("");

            // Prevent scroll jumping on dummy links
            document.querySelectorAll('.video-link[href="#"]').forEach((link) => {
                link.addEventListener("click", (event) => event.preventDefault());
            });
        }

        function renderPage() {
            const tool = tutorialModules.find((item) => item.id === currentToolId);
            renderTabs();
            renderIntro(tool);
            renderSharedFirebaseInfo(tool);
            renderEpisodes(tool);
            animateEpisodesEntrance();
        }

        // Handle Realtime Search filtering
        searchQuery.addEventListener("input", (e) => {
            activeQuery = e.target.value;
            if (activeQuery) {
                clearSearchBtn.classList.remove("hidden");
            } else {
                clearSearchBtn.classList.add("hidden");
            }
            const tool = tutorialModules.find((item) => item.id === currentToolId);
            renderEpisodes(tool);
        });

        clearSearchBtn.addEventListener("click", () => {
            searchQuery.value = "";
            activeQuery = "";
            clearSearchBtn.classList.add("hidden");
            const tool = tutorialModules.find((item) => item.id === currentToolId);
            renderEpisodes(tool);
        });

        // Initialize Page
        document.addEventListener("DOMContentLoaded", () => {
            // Count total episodes and animate
            const total = tutorialModules.reduce((sum, tool) => sum + tool.episodes.length, 0);
            animateCount(totalEpisodesEl, total);
            renderPage();

            // Simple entrance animation for header elements
            anime({
                targets: 'header h1, header p, header nav',
                opacity: [0, 1],
                translateY: [-15, 0],
                delay: anime.stagger(100),
                easing: 'easeOutExpo',
                duration: 1000
            });
        });
    </script>
</body>
</html>
