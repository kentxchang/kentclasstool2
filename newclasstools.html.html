body{font-family:-apple-system,"Segoe UI","Microsoft JhengHei",sans-serif;margin:0;background:#F1F5F9;color:#0F172A;line-height:1.6}
.wrap{max-width:960px;margin:0 auto;padding:24px 18px 60px}
header.top{background:linear-gradient(135deg,var(--a),var(--b));color:#fff;border-radius:16px;padding:24px 26px;margin-bottom:20px;box-shadow:0 10px 30px rgba(99,102,241,.25)}
header.top h1{margin:0 0 6px;font-size:24px;font-weight:900}
header.top .meta{font-size:14px;opacity:.95}
header.top .stat{display:inline-block;background:rgba(255,255,255,.2);border-radius:999px;padding:3px 12px;margin:8px 8px 0 0;font-weight:700;font-size:13px}
section{background:#fff;border-radius:14px;padding:18px 20px;margin-bottom:16px;box-shadow:0 4px 14px rgba(15,23,42,.06)}
section h2{margin:0 0 6px;font-size:18px;font-weight:900}
section h2 .cnt{font-size:12px;font-weight:700;color:#fff;background:#3B82F6;border-radius:999px;padding:2px 10px;margin-left:6px;vertical-align:middle}
.time{color:#64748b;font-size:12.5px;margin-bottom:6px}
.q{font-weight:800;font-size:15px;margin:6px 0 10px;padding:8px 12px;background:#F8FAFC;border-left:4px solid var(--a);border-radius:6px}
.passage{margin:6px 0 10px;font-size:13.5px}
.passage summary{cursor:pointer;font-weight:700;color:var(--a)}
.passage>div{white-space:pre-wrap;background:#F8FAFC;padding:10px;border-radius:8px;margin-top:6px}
.key{background:#ECFDF5;border:1px solid #A7F3D0;border-radius:8px;padding:8px 12px;margin:0 0 10px;font-size:13.5px}
.key b{color:#059669}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th,td{text-align:left;padding:7px 10px;border-bottom:1px solid #E2E8F0;vertical-align:top}
th{background:#F8FAFC;font-weight:800;color:#475569}
td.nm{font-weight:700;white-space:nowrap}
.ok{color:#059669;font-weight:800}.no{color:#DC2626;font-weight:800}
.mono{font-variant-numeric:tabular-nums}
.imgcell img{max-width:200px;max-height:160px;border-radius:8px;border:1px solid #E2E8F0}
.empty{color:#94A3B8;text-align:center;padding:18px}
ul.notes{list-style:none;padding:0;margin:0;display:flex;flex-wrap:wrap;gap:10px}
ul.notes li{background:#FFFBEB;border:1px solid #FDE68A;border-radius:10px;padding:10px 12px;max-width:240px;font-size:13.5px}
ul.notes li .who{font-weight:800;font-size:12px;color:#92400E;display:block;margin-bottom:4px}
ul.notes li img{max-width:100%;border-radius:6px}
footer{text-align:center;color:#94A3B8;font-size:12px;margin-top:24px}
</style></head><body><div class="wrap">
<header class="top">
  <h1>📚 上課歷程紀錄</h1>
  <div class="meta">教室代碼：<b>${esc(State.roomCode||"—")}</b>　·　匯出時間：${new Date().toLocaleString("zh-TW")}</div>
  <div><span class="stat">🧩 ${rounds.length} 個互動回合</span><span class="stat">✉️ ${totalResp} 則回應</span></div>
</header>
${sections||'<section><p class="empty">本次上課沒有互動工具的作答紀錄。</p></section>'}
<footer>由「剛好學－整合版課堂互動整合工具」彙整產生　·　Made by 阿剛老師</footer>
</div></body></html>`;
    return {html, count:rounds.length, responses:totalResp};
  },

  /** 單一回合的作答內容表格（依模式排版） */
  histSectionBody(h,p,rs){
    if(!rs.length) return `<p class="empty">（本回合無學生回應）</p>`;
    const mode=h.mode;
    const rowsOf=(fn)=>rs.map(r=>`<tr><td class="nm">${esc(r.name||"—")}</td>${fn(r)}</tr>`).join("");
    const simpleTable=(label,fn)=>`<table><thead><tr><th>姓名</th><th>${label}</th></tr></thead><tbody>${rowsOf(fn)}</tbody></table>`;
    if(mode==="truefalse")
      return simpleTable("作答", r=>`<td>${r.value===0?"⭕ 是":r.value===1?"❌ 否":"—"}</td>`);
    if(mode==="quickpoll"){
      const opts=p.options||[];
      return simpleTable("選擇", r=>`<td>${esc(opts[r.value]??String(r.value??"—"))}</td>`);
    }
    if(mode==="choice"&&p.simple)
      return simpleTable("作答", r=>`<td>選項 ${Number(r.value)+1}</td>`);
    if(mode==="choice"){
      const qs=p.questions||[];
      const key=`<div class="key"><b>標準答案：</b>${qs.map((q,i)=>`${i+1}.${String.fromCharCode(65+q.answer)}`).join("　")}</div>`;
      const body=rs.map(r=>{
        const a=Array.isArray(r.value)?r.value:[];
        const score=qs.reduce((n,q,i)=>n+(a[i]===q.answer?1:0),0);
        const detail=qs.map((q,i)=>{
          const sel=a[i];
          const ch=sel==null?"–":String.fromCharCode(65+sel);
          return `<span class="${sel===q.answer?'ok':'no'}">${i+1}.${ch}</span>`;
        }).join("　");
        return `<tr><td class="nm">${esc(r.name)}</td><td class="mono"><b>${score}/${qs.length}</b></td><td>${detail}</td></tr>`;
      }).join("");
      return key+`<table><thead><tr><th>姓名</th><th>得分</th><th>各題作答</th></tr></thead><tbody>${body}</tbody></table>`;
    }
    if(mode==="reading"){
      const qs=p.questions||[];
      const key=`<div class="key"><b>標準答案：</b>${qs.map((q,i)=>`${i+1}.${String.fromCharCode(65+q.answer)}`).join("　")}</div>`;
      const body=rs.map(r=>{
        const v=r.value&&typeof r.value==="object"?r.value:{};
        const a=Array.isArray(v.answers)?v.answers:[];
        const score=typeof v.correct==="number"?v.correct:qs.reduce((n,q,i)=>n+(a[i]===q.answer?1:0),0);
        const detail=qs.map((q,i)=>{
          const sel=a[i]; const ch=sel==null?"–":String.fromCharCode(65+sel);
          return `<span class="${sel===q.answer?'ok':'no'}">${i+1}.${ch}</span>`;
        }).join("　");
        return `<tr><td class="nm">${esc(r.name)}</td><td class="mono"><b>${score}/${qs.length}</b></td><td>${detail}</td></tr>`;
      }).join("");
      return key+`<table><thead><tr><th>姓名</th><th>答對</th><th>各題作答</th></tr></thead><tbody>${body}</tbody></table>`;
    }
    if(mode==="text"||mode==="wordcloud"||mode==="unknown")
      return simpleTable("回應", r=>`<td>${typeof r.value==="object"?esc(JSON.stringify(r.value)):esc(String(r.value??""))}</td>`);
    if(mode==="sticky"){
      const items=rs.map(r=>{
        const v=r.value;
        const inner=(v&&v.t==="img")?`<img src="${v.v}">`:esc((v&&v.t==="text")?v.v:String(v??""));
        return `<li><span class="who">👤 ${esc(r.name)}</span>${inner}</li>`;
      }).join("");
      return `<ul class="notes">${items}</ul>`;
    }
    if(mode==="drawing")
      return simpleTable("作品", r=>`<td class="imgcell"><img src="${r.value}"></td>`);
    if(mode==="audio")
      return simpleTable("錄音", r=>`<td><audio controls src="${r.value}"></audio></td>`);
    if(mode==="focus")
      return simpleTable("完成秒數", r=>`<td class="mono">${Number(r.value).toFixed(2)} 秒</td>`);
    if(mode==="buzzer"){
      const tms=t=>t?.toMillis?.() ?? (typeof t==="number"?t:0);   // 相容 Firestore Timestamp 與本機 ms 數字
      const sorted=[...rs].sort((a,b)=>(tms(a.ts)||9e15)-(tms(b.ts)||9e15));
      return `<table><thead><tr><th>名次</th><th>姓名</th><th>時間</th></tr></thead><tbody>`+
        sorted.map((r,i)=>`<tr><td class="mono">${i===0?"🏆 1":i+1}</td><td class="nm">${esc(r.name)}</td><td>${tms(r.ts)?new Date(tms(r.ts)).toLocaleTimeString("zh-TW"):""}</td></tr>`).join("")+
        `</tbody></table>`;
    }
    if(mode==="ordering"){
      const key=`<div class="key"><b>正解：</b>${esc((p.items||[]).join(" → "))}</div>`;
      return key+`<table><thead><tr><th>姓名</th><th>正誤</th><th>作答順序</th></tr></thead><tbody>`+
        rs.map(r=>{ const v=r.value||{}; const ok=v.correct;
          const ord=Array.isArray(v.order)?v.order.join(" → "):"";
          return `<tr><td class="nm">${esc(r.name)}</td><td>${ok?'<span class="ok">✅ 正確</span>':'<span class="no">❌ 錯誤</span>'}</td><td>${esc(ord)}</td></tr>`;
        }).join("")+`</tbody></table>`;
    }
    if(mode==="matching"){
      const key=`<div class="key"><b>正解：</b>${esc((p.pairs||[]).map(x=>x.l+"↔"+x.r).join("、"))}</div>`;
      return key+`<table><thead><tr><th>姓名</th><th>正誤</th><th>答對/總數</th></tr></thead><tbody>`+
        rs.map(r=>{ const v=r.value||{}; const ok=v.correct;
          return `<tr><td class="nm">${esc(r.name)}</td><td>${ok?'<span class="ok">✅ 全對</span>':'<span class="no">❌ 部分錯誤</span>'}</td><td class="mono">${v.correctCount??"—"} / ${v.total??"—"}</td></tr>`;
        }).join("")+`</tbody></table>`;
    }
    if(mode==="weburl")
      return simpleTable("狀態", r=>`<td>✅ 已開啟</td>`);
    if(mode==="peerreview")
      return `<p class="empty">（同儕互評為文字／繪圖題的延伸，作品與評語請見對應回合）</p>`;
    // 其他／未知模式：通用呈現
    return simpleTable("回應", r=>`<td>${typeof r.value==="object"?esc(JSON.stringify(r.value)):esc(String(r.value??""))}</td>`);
  },

  renderTeacherCtl(){
    const cardsView=$("tools-cards-view"), activeView=$("tools-active-view");
    if(!cardsView||!activeView) return;
    const c=this.control;
    const active=!!(c&&c.mode);
    // 進行中互動 → 顯示設定/結果視圖；否則回到全畫面功能圖卡選單
    cardsView.classList.toggle("hidden", active);
    activeView.classList.toggle("hidden", !active);
    if(!active||c.mode!=="sticky") document.body.classList.remove("sticky-maxed");
    if(!active) return;
    $("tools-btn-pause").textContent=c.paused?"▶ 恢復作答":"⏸ 暫停作答";
    // 互評僅支援文字題/繪圖題（互評進行中顯示以便停止）
    $("tools-btn-peer").classList.toggle("hidden", !["text","drawing","peerreview"].includes(c.mode));
    const info=TOOL_MODES.find(m=>m.id===c.mode);
    $("tools-wall-title").innerHTML=`${info?info.icon+" "+info.name:(c.mode==="peerreview"?"🌟 同儕互評":c.mode)}${c.paused?' <span class="badge badge-amber">已暫停</span>':''}`;
    this.renderWall();
  },

  /* ---------- 即時回應牆 ---------- */
  renderWall(){
    const av=$("tools-active-view");
    if(av && av.classList.contains("hidden")) return;   // 在功能圖卡選單時不渲染
    const body=$("tools-wall-body"); if(!body||State.role!=="teacher") return;
    const c=this.control;
    if(!c||!c.mode) return;
    let rs=this.curResponses();
    if(this.starOnly) rs=rs.filter(r=>r.starred);
    rs.sort(this.sortBy==="name"
      ? (a,b)=>String(a.name).localeCompare(String(b.name),"zh-Hant")
      : (a,b)=>(a.ts?.toMillis?.()||0)-(b.ts?.toMillis?.()||0));
    const cnt=$("tools-resp-count"); if(cnt) cnt.textContent=rs.length+" 則回應";
    const p=c.payload||{};
    const qHead=p.question?`<div style="font-weight:800;margin-bottom:10px;font-size:15px">❓ ${esc(p.question)}</div>`:"";

    if(c.mode==="truefalse"){
      body.innerHTML=qHead+this.barsHtml(["⭕ 是","❌ 否"], i=>rs.filter(r=>r.value===i).length)
        + this.respListHtml(rs, r=>r.value===0?"⭕ 是":"❌ 否");
    }
    else if(c.mode==="quickpoll"){
      const opts=p.options||[];
      body.innerHTML=qHead
        +(p.anonymous?'<div class="badge badge-blue" style="margin-bottom:8px">🙈 匿名投票</div>':"")
        +this.barsHtml(opts, i=>rs.filter(r=>r.value===i).length)
        +(p.anonymous?"":this.respListHtml(rs, r=>esc(opts[r.value]??"")));
    }
    else if(c.mode==="choice"&&p.simple){
      body.innerHTML=`<div style="font-weight:800;margin-bottom:10px">🔠 無題目快問快答（學生按 1~4）</div>`
        +this.barsHtml(["選項 1","選項 2","選項 3","選項 4"], i=>rs.filter(r=>r.value===i).length)
        +this.respListHtml(rs, r=>"選項 "+(r.value+1));
    }
    else if(c.mode==="choice"){
      const qs=p.questions||[];
      const score=r=>Array.isArray(r.value)?qs.reduce((n,q,i)=>n+(r.value[i]===q.answer?1:0),0):0;
      body.innerHTML=`
        <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
          <span style="font-weight:800">📋 自訂選擇題（共 ${qs.length} 題）</span>
          <button class="btn btn-ghost btn-sm" id="ch-detail">👤 個別作答</button>
          <button class="btn btn-ghost btn-sm" id="ch-view-q">👁 查看題目</button>
          <button class="btn btn-ghost btn-sm" id="ch-csv">⬇ 下載 CSV</button>
        </div>`
        +qs.map((q,qi)=>{
          const counts=q.options.map((_,oi)=>rs.filter(r=>Array.isArray(r.value)&&r.value[qi]===oi).length);
          const okN=rs.filter(r=>Array.isArray(r.value)&&r.value[qi]===q.answer).length;
          return `<div class="glass" style="padding:10px;margin-bottom:8px">
            <div style="font-weight:800;font-size:14px;margin-bottom:6px">${qi+1}. ${esc(q.question)} <span class="badge badge-green">答對 ${okN}/${rs.length}</span></div>
            ${q.options.map((o,oi)=>`<div class="bar-row" style="margin-bottom:3px">
              <div class="bl" style="flex-basis:30px">${String.fromCharCode(65+oi)}${q.answer===oi?"✅":""}</div>
              <div class="bt" style="height:18px"><div class="bf" style="width:${counts[oi]/Math.max(1,...counts)*100}%"></div></div>
              <div class="bn num" style="flex-basis:28px">${counts[oi]}</div></div>`).join("")}
            ${this.wrongNameLine(this.wrongNames(c, rs, qi, q.answer))}
          </div>`;
        }).join("")
        +this.respListHtml(rs, r=>`得分 <b class="num">${score(r)} / ${qs.length}</b>`);
      const dt=body.querySelector("#ch-detail");
      if(dt) dt.onclick=()=>this.openStudentAnswers(c, rs);
      const vq=body.querySelector("#ch-view-q");
      if(vq) vq.onclick=()=>this.viewQuestionsModal(qs);
      const csv=body.querySelector("#ch-csv");
      if(csv) csv.onclick=()=>this.exportChoiceCsv(qs, rs);
    }
    else if(c.mode==="text"){
      body.innerHTML=qHead+this.respListHtml(rs, r=>esc(r.value));
    }
    else if(c.mode==="buzzer"){
      // 搶答固定依時間排序（與排序選項無關）
      rs=[...rs].sort((a,b)=>(a.ts?.toMillis?.()||9e15)-(b.ts?.toMillis?.()||9e15));
      body.innerHTML=`<div style="font-weight:800;margin-bottom:10px">⚡ 搶答順序</div>`+
        (rs.length?rs.map((r,i)=>`
        <div class="resp-item" style="${i===0?'border:2px solid #F59E0B;background:#FFFBEB':''}">
          <span style="font-size:18px;font-weight:900;width:30px" class="num">${i===0?"🏆":i+1}</span>
          <span class="nm">${esc(r.name)}</span>
          <span class="val num" style="color:var(--ink2);font-size:12px">${r.ts?new Date(r.ts.toMillis()).toLocaleTimeString():""}</span>
        </div>`).join(""):'<div style="color:var(--ink2);text-align:center;padding:30px">等待學生搶答…</div>');
      // 教師端勝者大字提示（每回合一次，5 秒自動關閉）
      if(rs.length&&this._buzzShown!==c.round){
        this._buzzShown=c.round;
        const ov=document.createElement("div");
        ov.style.cssText="position:fixed;inset:0;z-index:250;display:flex;align-items:center;justify-content:center;background:rgba(15,23,42,.55);backdrop-filter:blur(4px)";
        ov.innerHTML=`<div class="glass" style="padding:40px 60px;text-align:center;animation:popIn .25s">
          <div style="font-size:50px">🏆</div>
          <div style="font-size:34px;font-weight:900" class="grad-text">${esc(rs[0].name)}</div>
          <div style="font-weight:800;color:var(--ink2);margin-top:6px">搶答成功！</div></div>`;
        ov.onclick=()=>ov.remove();
        document.body.appendChild(ov);
        setTimeout(()=>ov.remove(), 5000);
      }
    }
    else if(c.mode==="drawing"){
      body.innerHTML=qHead+`<div class="thumb-grid">`+rs.map(r=>`
        <div class="thumb-card"><img src="${r.value}" data-zoom="1"><div class="nm">${esc(r.name)} ${this.starBtn(r)}</div></div>`).join("")+`</div>`;
      this.bindZoomAndStars(body);
    }
    else if(c.mode==="audio"){
      body.innerHTML=qHead+rs.map(r=>`
        <div class="resp-item"><span class="nm">${esc(r.name)}</span>
        <audio controls src="${r.value}" style="flex:1;height:36px"></audio>${this.starBtn(r)}</div>`).join("");
      this.bindZoomAndStars(body);
    }
    else if(c.mode==="wordcloud"){
      const freq={};
      rs.forEach(r=>String(r.value).split(/[\s,，、;；]+/).filter(Boolean).forEach(w=>freq[w]=(freq[w]||0)+1));
      const words=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,60);
      const max=Math.max(1,...words.map(w=>w[1]));
      const colors=["#3B82F6","#8B5CF6","#EC4899","#F97316","#10B981","#06B6D4"];
      body.innerHTML=qHead+`
        <div style="text-align:right;margin-bottom:6px"><button class="btn btn-ghost btn-sm" id="wc-ai">✨ AI 語意分析 <span style="font-size:10px;opacity:.7">(${esc(AIService.modelLabel())})</span></button></div>
        <div class="wordcloud-box glass">${words.map(([w,n],i)=>
          `<span style="font-size:${14+ (n/max)*34}px;color:${colors[i%colors.length]}">${esc(w)}</span>`).join("")||'<span style="color:var(--ink2);font-size:14px;font-weight:400">等待學生輸入…</span>'}</div>
        <div id="wc-ai-out" style="margin-top:10px"></div>`
        + this.respListHtml(rs, r=>esc(r.value));
      const aib=body.querySelector("#wc-ai");
      if(aib) aib.onclick=async()=>{
        if(!rs.length){ UI.toast("尚無回應可分析","err"); return; }
        aib.disabled=true; aib.textContent="分析中…";
        try{
          const txt=await AIService.generateText(`以下是學生對「${p.question||""}」的即時回應，請用繁體中文做語意分析：歸納 3-5 個主要觀點群組、各佔比例、以及值得課堂討論的洞察。請精簡條列。\n\n回應：\n${rs.map(r=>"- "+r.value).join("\n")}`);
          body.querySelector("#wc-ai-out").innerHTML=`<div class="glass" style="padding:12px;font-size:13.5px;line-height:1.7;white-space:pre-wrap">${esc(txt)}</div>`;
        }catch(e){ UI.toast("AI 分析失敗："+e.message,"err"); }
        aib.disabled=false; aib.textContent="✨ AI 語意分析";
      };
    }
    else if(c.mode==="sticky"){
      // 傳入未過濾名單：加星篩選在牆內以顯示/隱藏處理，避免刪掉便利貼而失去位置
      this.renderStickyWall(body, this.curResponses(), p, c);
    }
    else if(c.mode==="focus"){
      const N=p.count||25;
      const sorted=[...rs].sort((a,b)=>a.value-b.value);
      body.innerHTML=`<div style="font-weight:800;margin-bottom:10px">🎯 完成排行（依序點 1→${N} 的秒數）</div>`+
        sorted.map((r,i)=>`<div class="resp-item"><span style="width:30px;font-weight:900" class="num">${["🥇","🥈","🥉"][i]||i+1}</span>
          <span class="nm">${esc(r.name)}</span><span class="val num" style="text-align:right;font-weight:800">${Number(r.value).toFixed(2)} 秒</span></div>`).join("");
    }
    else if(c.mode==="ordering"||c.mode==="matching"){
      const wrong=rs.filter(r=>!this.quizCorrect(c,r)).map(r=>r.name);
      const okN=rs.length-wrong.length;
      body.innerHTML=qHead+`
        <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center">
          <span style="font-weight:800">${c.mode==="ordering"?"🔢 排序題":"🔗 配對題"}</span>
          <span class="badge badge-green">答對 ${okN}/${rs.length}</span>
          <button class="btn btn-ghost btn-sm" id="om-detail">👤 個別作答</button>
        </div>
        <div class="glass" style="padding:10px;margin-bottom:8px">${this.wrongNameLine(wrong)}</div>`
        +rs.map(r=>{
          const ok=this.quizCorrect(c,r)?'<span class="badge badge-green">✅ 正確</span>':'<span class="badge badge-red">❌ 錯誤</span>';
          return `<div class="resp-item"><span class="nm">${esc(r.name)}</span><span class="val">${ok}</span>${this.starBtn(r)}</div>`;
        }).join("")
        + `<div class="hint">💡 正解：${esc(c.mode==="ordering"?(p.items||[]).join(" → "):(p.pairs||[]).map(x=>x.l+"↔"+x.r).join("、"))}</div>`;
      const omd=body.querySelector("#om-detail");
      if(omd) omd.onclick=()=>this.openStudentAnswers(c, rs);
      this.bindZoomAndStars(body);
    }
    else if(c.mode==="reading"){
      const qs=p.questions||[];
      const corr=r=>(r.value&&typeof r.value==="object")?r.value.correct:r.value;
      body.innerHTML=`
        <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
          <span style="font-weight:800">📚 閱讀測驗（共 ${qs.length} 題）</span>
          <button class="btn btn-ghost btn-sm" id="rd-detail">👤 個別作答</button>
          <button class="btn btn-ghost btn-sm" id="rd-view-q">👁 查看文章與題目</button>
        </div>`
        +qs.map((q,qi)=>{
          const okN=rs.filter(r=>r.value&&Array.isArray(r.value.answers)&&r.value.answers[qi]===q.answer).length;
          return `<div class="glass" style="padding:9px 11px;margin-bottom:7px">
            <div class="bar-row" style="margin:0"><div class="bl" style="flex-basis:50px">第 ${qi+1} 題</div>
              <div class="bt"><div class="bf" style="width:${rs.length?okN/rs.length*100:0}%"></div></div>
              <div class="bn num" style="flex-basis:64px">${okN}/${rs.length}</div></div>
            ${this.wrongNameLine(this.wrongNames(c, rs, qi, q.answer))}</div>`;
        }).join("")
        +this.respListHtml(rs, r=>`<b class="num">${corr(r)} / ${qs.length}</b> 題正確`);
      const rdt=body.querySelector("#rd-detail");
      if(rdt) rdt.onclick=()=>this.openStudentAnswers(c, rs);
      const vq=body.querySelector("#rd-view-q");
      if(vq) vq.onclick=()=>this.viewQuestionsModal(qs, p.passage);
      this.bindZoomAndStars(body);
    }
    else if(c.mode==="weburl"){
      body.innerHTML=`<div style="font-weight:800;margin-bottom:10px">🌐 已派送${p.url?"網址":"HTML 內容"}</div>
        ${p.url?`<div class="code-view">${esc(p.url)}</div>`:""}
        <div style="margin-top:12px">`+this.respListHtml(rs, ()=>"✅ 已開啟")+`</div>`;
    }
    else if(c.mode==="peerreview"){
      this.renderPeerWall(body);
    }
  },

  /* ---------- 便利貼牆（自由移動 + 縮放 + 畫筆標註，沿用原 01 完整功能） ---------- */
  renderStickyWall(body, rs, p, c){
    // 牆面只建立一次（同一回合內不重建，保留便利貼位置與標註筆跡）
    if(this._stickyRound!==c.round||!body.querySelector("#stk-wall")){
      this._stickyRound=c.round;
      this._stickyMap=new Map();
      this._stickyScale=1;
      const PEN_COLORS=["#1E293B","#EF4444","#3B82F6","#16A34A","#F59E0B","#8B5CF6"];
      body.innerHTML=`
        ${p.question?`<div style="font-weight:800;margin-bottom:8px;font-size:15px">❓ ${esc(p.question)}</div>`:""}
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px">
          <button class="btn btn-grad btn-sm" id="stk-mode-mouse">🖱️ 滑鼠模式</button>
          <button class="btn btn-ghost btn-sm" id="stk-mode-draw">✏️ 畫筆模式</button>
          <span id="stk-pen-tools" style="display:flex;align-items:center;gap:5px;opacity:.45;pointer-events:none">
            ${PEN_COLORS.map((cl,i)=>`<span class="wb-color stk-pen-color ${i===0?'active':''}" data-c="${cl}" style="background:${cl};width:20px;height:20px"></span>`).join("")}
            <select class="field" id="stk-pen-w" style="width:auto;padding:3px 6px;font-size:12px">
              <option value="3">細</option><option value="5" selected>中</option><option value="10">粗</option></select>
            <button class="btn btn-ghost btn-sm" id="stk-eraser">🧽</button>
            <button class="btn btn-ghost btn-sm" id="stk-draw-clear">🗑 清除筆跡</button>
          </span>
          <span style="flex:1"></span>
          <button class="btn btn-ghost btn-sm" id="stk-zoom-out">−</button>
          <span class="num" id="stk-zoom-lbl" style="font-size:12px;font-weight:800;min-width:42px;text-align:center">100%</span>
          <button class="btn btn-ghost btn-sm" id="stk-zoom-in">＋</button>
          <button class="btn btn-ghost btn-sm" id="stk-zoom-reset">↺</button>
          <button class="btn btn-ghost btn-sm" id="stk-fullscreen">🔳 全螢幕</button>
        </div>
        <div id="stk-wall" style="position:relative;height:max(420px,58vh);overflow:hidden;border-radius:14px;
          background:repeating-linear-gradient(0deg,rgba(148,163,184,.08) 0 1px,transparent 1px 32px),repeating-linear-gradient(90deg,rgba(148,163,184,.08) 0 1px,transparent 1px 32px),#FFFBEB">
          <div id="stk-notes" style="position:absolute;inset:0;z-index:1"></div>
          <canvas id="stk-cv" style="position:absolute;inset:0;z-index:50;pointer-events:none;touch-action:none"></canvas>
          <div id="stk-ph" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#CBD5E1;font-weight:800;font-size:18px;pointer-events:none">🗒️ 等待學生送出便利貼…</div>
        </div>`;
      this.bindStickyWall(body);
    }
    // 增量更新便利貼（保留既有位置）
    const notesEl=body.querySelector("#stk-notes"), ph=body.querySelector("#stk-ph");
    if(ph) ph.style.display=rs.length?"none":"flex";
    const ids=new Set(rs.map(r=>r.id));
    let idx=this._stickyMap.size;
    for(const r of rs){
      const old=this._stickyMap.get(r.id);
      if(old){ this.setStickyContent(old, r); }
      else{
        const el=this.createStickyEl(r, idx++, notesEl);
        notesEl.appendChild(el);
        this._stickyMap.set(r.id, el);
      }
    }
    for(const [id,el] of [...this._stickyMap]){
      if(!ids.has(id)){ el.remove(); this._stickyMap.delete(id); }
    }
    // 加星篩選：僅顯示已加星
    for(const [id,el] of this._stickyMap){
      const r=rs.find(x=>x.id===id);
      el.style.display=(this.starOnly&&!(r&&r.starred))?"none":"flex";
    }
  },

  createStickyEl(r, idx, container){
    const el=document.createElement("div");
    el.dataset.rid=r.id;
    el.style.cssText=`position:absolute;width:200px;height:200px;padding:12px;border-radius:8px;display:flex;flex-direction:column;
      background:${STICKY_COLORS[idx%STICKY_COLORS.length]};border:1px solid rgba(0,0,0,.1);box-shadow:0 6px 16px rgba(15,23,42,.18);
      cursor:move;z-index:10;transform-origin:top left;transform:scale(${this._stickyScale});user-select:none`;
    // 隨機初始位置（避開邊緣）
    const cw=container.clientWidth||800, ch=container.clientHeight||500;
    const sz=200*this._stickyScale;
    el.style.left=(Math.random()*Math.max(cw-sz-20,100))+"px";
    el.style.top=(Math.random()*Math.max(ch-sz-20,100))+"px";
    const head=document.createElement("div");
    head.style.cssText="font-weight:800;font-size:12.5px;border-bottom:1px solid rgba(0,0,0,.2);padding-bottom:5px;margin-bottom:6px;display:flex;align-items:center;gap:5px;flex:0 0 auto";
    head.innerHTML=`👤 ${esc(r.name)}<span style="flex:1"></span><button class="star ${r.starred?'on':''}" data-star="${r.id}" style="font-size:15px">⭐</button>`;
    head.querySelector("[data-star]").onclick=e=>{
      e.stopPropagation();
      const cur=this.responses.find(x=>x.id===r.id);
      FS.updateDoc(FS.doc(this.respCol(), r.id), {starred:!(cur&&cur.starred)}).catch(()=>{});
    };
    head.querySelector("[data-star]").onmousedown=e=>e.stopPropagation();
    el.appendChild(head);
    const content=document.createElement("div");
    content.className="stk-content";
    content.style.cssText="flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden";
    el.appendChild(content);
    this.setStickyContent(el, r);
    this.makeStickyDraggable(el);
    return el;
  },

  setStickyContent(el, r){
    // 加星狀態同步
    const star=el.querySelector(".star"); if(star) star.classList.toggle("on", !!r.starred);
    const content=el.querySelector(".stk-content");
    const v=r.value;
    const sig=JSON.stringify(v);
    if(content.dataset.sig===sig) return;
    content.dataset.sig=sig;
    if(v&&v.t==="img"){
      content.innerHTML=`<img src="${v.v}" style="max-width:100%;max-height:100%;border-radius:6px;object-fit:contain;cursor:zoom-in" title="點擊放大">`;
      const img=content.querySelector("img");
      // 阻止 pointerdown 冒泡到便利貼（否則拖曳邏輯會 preventDefault，吞掉點擊事件，無法放大）
      img.addEventListener("pointerdown", e=>e.stopPropagation());
      img.onmousedown=e=>e.stopPropagation();
      img.onclick=()=>UI.modal(`<img src="${v.v}" style="width:100%;border-radius:12px">`,{wide:true});
    }else{
      const text=(v&&v.t==="text")?v.v:String(v??"");
      const n=text.length;
      const fs=n<=5?42:n<=10?32:n<=20?25:n<=30?20:n<=50?16:13;  // 依字數自動縮放字級（沿用原 01）
      content.innerHTML=`<div style="font-size:${fs}px;font-weight:800;line-height:1.3;text-align:center;word-break:break-word;width:100%">${esc(text)}</div>`;
    }
  },

  makeStickyDraggable(el){
    el.addEventListener("pointerdown", e=>{
      if(e.button!==0) return;
      e.preventDefault();
      try{ el.setPointerCapture(e.pointerId); }catch(err){}
      el.style.zIndex=999;
      const sx=e.clientX, sy=e.clientY, ox=el.offsetLeft, oy=el.offsetTop;
      const wall=el.parentElement;
      const move=ev=>{
        let nl=ox+(ev.clientX-sx), nt=oy+(ev.clientY-sy);
        nl=Math.max(0, Math.min(nl, wall.clientWidth-el.offsetWidth*this._stickyScale));
        nt=Math.max(0, Math.min(nt, wall.clientHeight-el.offsetHeight*this._stickyScale));
        el.style.left=nl+"px"; el.style.top=nt+"px";
      };
      const up=()=>{
        el.style.zIndex=10;
        el.removeEventListener("pointermove", move);
        el.removeEventListener("pointerup", up);
        el.removeEventListener("pointercancel", up);
      };
      el.addEventListener("pointermove", move);
      el.addEventListener("pointerup", up);
      el.addEventListener("pointercancel", up);
    });
  },

  bindStickyWall(body){
    const wall=body.querySelector("#stk-wall");
    const cv=body.querySelector("#stk-cv"), ctx=cv.getContext("2d");
    let tool="pen", color="#1E293B", width=5, mode="mouse";
    const sizeCanvas=()=>{
      if(!cv.isConnected) return;
      const r=wall.getBoundingClientRect();
      if(r.width<2||r.height<2) return;
      if(cv.width===Math.round(r.width)&&cv.height===Math.round(r.height)) return;
      // 保留既有筆跡
      const tmp=document.createElement("canvas"); tmp.width=cv.width||1; tmp.height=cv.height||1;
      tmp.getContext("2d").drawImage(cv,0,0);
      cv.width=Math.round(r.width); cv.height=Math.round(r.height);
      ctx.lineCap="round"; ctx.lineJoin="round";
      ctx.drawImage(tmp,0,0);
    };
    sizeCanvas();
    this._stickyResize=()=>sizeCanvas();
    window.addEventListener("resize", this._stickyResize);
    const setMode=m=>{
      mode=m;
      cv.style.pointerEvents=m==="draw"?"auto":"none";
      body.querySelector("#stk-mode-mouse").className="btn btn-sm "+(m==="mouse"?"btn-grad":"btn-ghost");
      body.querySelector("#stk-mode-draw").className="btn btn-sm "+(m==="draw"?"btn-grad":"btn-ghost");
      const pt=body.querySelector("#stk-pen-tools");
      pt.style.opacity=m==="draw"?"1":".45";
      pt.style.pointerEvents=m==="draw"?"auto":"none";
    };
    body.querySelector("#stk-mode-mouse").onclick=()=>setMode("mouse");
    body.querySelector("#stk-mode-draw").onclick=()=>setMode("draw");
    body.querySelectorAll(".stk-pen-color").forEach(b=>b.onclick=()=>{
      color=b.dataset.c; tool="pen";
      body.querySelectorAll(".stk-pen-color").forEach(x=>x.classList.toggle("active",x===b));
      body.querySelector("#stk-eraser").classList.remove("btn-grad");
    });
    body.querySelector("#stk-pen-w").onchange=e=>width=Number(e.target.value);
    body.querySelector("#stk-eraser").onclick=()=>{
      tool=tool==="eraser"?"pen":"eraser";
      body.querySelector("#stk-eraser").classList.toggle("btn-grad", tool==="eraser");
    };
    body.querySelector("#stk-draw-clear").onclick=()=>ctx.clearRect(0,0,cv.width,cv.height);
    // 畫筆事件
    let drawing=false, last=null;
    const pos=e=>{ const r=cv.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; };
    cv.addEventListener("pointerdown", e=>{ e.preventDefault(); try{ cv.setPointerCapture(e.pointerId); }catch(err){} drawing=true; last=pos(e); });
    cv.addEventListener("pointermove", e=>{
      if(!drawing) return; e.preventDefault();
      const pt=pos(e);
      ctx.globalCompositeOperation=tool==="eraser"?"destination-out":"source-over";
      ctx.strokeStyle=color; ctx.lineWidth=tool==="eraser"?22:width; ctx.lineCap="round";
      ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(pt.x,pt.y); ctx.stroke();
      last=pt;
    });
    const stop=()=>drawing=false;
    cv.addEventListener("pointerup", stop); cv.addEventListener("pointercancel", stop);
    // 縮放
    const setZoom=s=>{
      this._stickyScale=Math.min(2,Math.max(.4,s));
      body.querySelector("#stk-zoom-lbl").textContent=Math.round(this._stickyScale*100)+"%";
      for(const el of this._stickyMap.values()) el.style.transform=`scale(${this._stickyScale})`;
    };
    body.querySelector("#stk-zoom-in").onclick=()=>setZoom(this._stickyScale+.1);
    body.querySelector("#stk-zoom-out").onclick=()=>setZoom(this._stickyScale-.1);
    body.querySelector("#stk-zoom-reset").onclick=()=>setZoom(1);
    // 全螢幕放大：隱藏頂部標題列與分頁，只留滑鼠模式工具列與牆面
    const fsBtn=body.querySelector("#stk-fullscreen");
    fsBtn.onclick=()=>{
      const on=document.body.classList.toggle("sticky-maxed");
      fsBtn.innerHTML=on?"🗗 還原":"🔳 全螢幕";
      fsBtn.className="btn btn-sm "+(on?"btn-grad":"btn-ghost");
      requestAnimationFrame(()=>{ sizeCanvas(); setTimeout(sizeCanvas,60); });
    };
  },

  barsHtml(opts, countFn){
    const counts=opts.map((_,i)=>countFn(i));
    const max=Math.max(1,...counts);
    return opts.map((o,i)=>`
      <div class="bar-row">
        <div class="bl">${esc(o)}</div>
        <div class="bt"><div class="bf" style="width:${counts[i]/max*100}%"></div></div>
        <div class="bn num">${counts[i]}</div>
      </div>`).join("");
  },

  /* ---------- 有標準答案題型：作答取值與個別檢視 ---------- */
  quizAnswers(c, r){
    if(c.mode==="reading") return (r.value&&Array.isArray(r.value.answers))?r.value.answers:[];
    if(c.mode==="choice") return Array.isArray(r.value)?r.value:[];
    return [];
  },
  quizCorrect(c, r){
    const v=r.value;
    if(v&&typeof v==="object"&&!Array.isArray(v)&&("correct" in v)) return v.correct;
    return !!v;
  },
  /** 某一題答錯（含未作答）的學生姓名 */
  wrongNames(c, rs, qi, ansIdx){
    return rs.filter(r=>this.quizAnswers(c,r)[qi]!==ansIdx).map(r=>r.name);
  },
  wrongNameLine(names){
    if(!names.length) return `<div class="hint" style="margin:4px 0 0">✅ 全部答對</div>`;
    return `<div style="margin:5px 0 0;font-size:12.5px;line-height:1.7"><span class="badge badge-red">答錯 ${names.length}</span> ${names.map(esc).join("、")}</div>`;
  },

  /** 👤 個別作答情形：名單 → 點選查看單一學生每一題 */
  openStudentAnswers(c, rs){
    const p=c.payload||{};
    if(!rs.length){ UI.toast("目前沒有學生作答","err"); return; }
    const box=UI.modal("",{wide:true});
    const sorted=[...rs].sort((a,b)=>String(a.name).localeCompare(String(b.name),"zh-Hant"));
    const renderList=()=>{
      box.innerHTML=`<h3 style="margin:0 0 12px;font-weight:900">👤 個別作答情形（${sorted.length} 人）</h3>
        <div style="max-height:60vh;overflow:auto">${sorted.map((r,idx)=>{
          let label;
          if(c.mode==="choice"||c.mode==="reading"){ const qs=p.questions||[]; const a=this.quizAnswers(c,r);
            const sc=qs.reduce((n,q,i)=>n+(a[i]===q.answer?1:0),0); label=`${sc} / ${qs.length}`; }
          else if(c.mode==="ordering"){ label=this.quizCorrect(c,r)?'<span class="badge badge-green">✅ 正確</span>':'<span class="badge badge-red">❌ 錯誤</span>'; }
          else { const v=r.value; label=(v&&v.correctCount!=null)?`${v.correctCount} / ${v.total}`:(this.quizCorrect(c,r)?"✅ 全對":"部分正確"); }
          return `<button class="resp-item" data-i="${idx}" style="width:100%;text-align:left;cursor:pointer">
            <span class="nm">${esc(r.name)}</span><span class="val" style="text-align:right">${label}</span><span style="opacity:.45">›</span></button>`;
        }).join("")}</div>
        <div style="text-align:right;margin-top:12px"><button class="btn btn-grad" id="sa-close">關閉</button></div>`;
      box.querySelector("#sa-close").onclick=()=>UI.closeModal();
      box.querySelectorAll("[data-i]").forEach(b=>b.onclick=()=>renderDetail(sorted[Number(b.dataset.i)]));
    };
    const renderDetail=(r)=>{
      let inner="";
      if(c.mode==="choice"||c.mode==="reading"){
        const qs=p.questions||[], a=this.quizAnswers(c,r);
        inner=qs.map((q,i)=>{
          const my=a[i], ok=my===q.answer;
          return `<div class="glass" style="padding:11px;margin-bottom:7px">
            <div style="font-weight:800;margin-bottom:5px">${i+1}. ${esc(q.question||q.q)} ${ok?'<span class="badge badge-green">✓ 答對</span>':'<span class="badge badge-red">✗ 答錯</span>'}</div>
            ${(q.options||[]).map((o,j)=>{ const isAns=j===q.answer, isMy=j===my;
              const sty=isAns?"background:#DCFCE7;border-color:#16A34A":(isMy?"background:#FEE2E2;border-color:#EF4444":"");
              return `<div class="stu-opt-btn" style="margin-bottom:4px;font-size:13px;padding:7px 10px;cursor:default;${sty}">
                <span class="tag" style="flex:0 0 24px;height:24px">${String.fromCharCode(65+j)}</span><span style="flex:1">${esc(o)}</span>
                ${isAns?'<span style="font-weight:800;color:#15803D">✅ 正解</span>':(isMy?'<span style="font-weight:800;color:#B91C1C">他的答案</span>':'')}</div>`;}).join("")}
            ${q.explain?`<div class="hint" style="margin-top:5px">💡 ${esc(q.explain)}</div>`:""}
          </div>`;
        }).join("");
      }else if(c.mode==="ordering"){
        const items=p.items||[], order=(r.value&&Array.isArray(r.value.order))?r.value.order:null;
        if(order) inner=`<div style="font-weight:800;margin-bottom:6px">他的排序</div>`+order.map((k,i)=>`<div class="sortable-item" style="cursor:default;${k===i?'border-color:#16A34A;background:#DCFCE7':'border-color:#EF4444;background:#FEE2E2'}"><span class="num" style="width:22px">${i+1}</span><span style="flex:1">${esc(items[k])}</span>${k===i?'✓':'✗'}</div>`).join("");
        else inner=`<div class="hint">此學生未紀錄詳細排序（整體${this.quizCorrect(c,r)?"正確":"錯誤"}）</div>`;
        inner+=`<div style="font-weight:800;margin:10px 0 6px">💡 正確順序</div>`+items.map((t,i)=>`<div class="sortable-item" style="cursor:default;border-color:#16A34A"><span class="num" style="width:22px">${i+1}</span><span style="flex:1">${esc(t)}</span></div>`).join("");
      }else{
        const correctPairs=p.pairs||[];
        const myPairs=(r.value&&Array.isArray(r.value.pairs))?r.value.pairs:null;
        if(myPairs){
          inner=`<div style="font-weight:800;margin-bottom:6px">他的配對</div>`
            +myPairs.map(x=>`<div class="match-item ${x.ok?'done':''}" style="cursor:default;display:flex;justify-content:center;gap:8px;${x.ok?'':'border-color:#EF4444;background:#FEE2E2'}">${esc(x.l)} ↔ ${esc(x.r)} ${x.ok?'✓':'✗'}</div>`).join("")
            +`<div style="font-weight:800;margin:10px 0 6px">💡 正確配對</div>`;
        }else{
          const w=(r.value&&typeof r.value==="object")?r.value.wrong:null;
          inner=`<div class="hint" style="margin-bottom:6px">配對完成${w!=null?`（嘗試錯誤 ${w} 次）`:""}</div>`;
        }
        inner+=correctPairs.map(x=>`<div class="match-item done" style="cursor:default;display:flex;justify-content:center;gap:8px">${esc(x.l)} ↔ ${esc(x.r)}</div>`).join("");

  /** 解析自訂選擇題文字格式：題目,正解(1-4或A-D),選項1,選項2[,選項3,選項4]（每行一題） */
  parseMcLines(text){
    const qs=[];
    for(const line of text.split("\n")){
      const parts=line.split(/[,，]/).map(s=>s.trim());
      if(parts.length<4||!parts[0]) continue;
      let ans=parts[1].toUpperCase();
      ans=/^[A-D]$/.test(ans)?ans.charCodeAt(0)-65:Number(ans)-1;
      const options=parts.slice(2).filter(Boolean);
      if(isNaN(ans)||ans<0||ans>=options.length||options.length<2) continue;
      qs.push({question:parts[0], options, answer:ans});
    }
    return qs;
  },
  mcToLines(qs){ return qs.map(q=>[q.question, q.answer+1, ...q.options].join(",")).join("\n"); },

  /** 閱讀測驗題目：與選擇題同格式，固定 4 選項，選項後可多一欄「題目解析」
   *  題目,正確答案(1-4或A-D),選項1,選項2,選項3,選項4,題目解析(選填) */
  parseReadingLines(text){
    const qs=[];
    for(const line of text.split("\n")){
      const parts=line.split(/[,，]/).map(s=>s.trim());
      if(parts.length<6||!parts[0]) continue;          // 至少 題目,正解,4 選項
      let ans=parts[1].toUpperCase();
      ans=/^[A-D]$/.test(ans)?ans.charCodeAt(0)-65:Number(ans)-1;
      const options=parts.slice(2,6).filter(Boolean);  // 取 4 個選項
      if(isNaN(ans)||ans<0||ans>=options.length||options.length<2) continue;
      const explain=parts.slice(6).join("，").trim();   // 第 7 欄之後皆視為解析
      qs.push({question:parts[0], options, answer:ans, explain});
    }
    return qs;
  },
  readingToLines(qs){
    return qs.map(q=>{
      const opts=[...(q.options||[])]; while(opts.length<4) opts.push("");
      const row=[q.question, q.answer+1, opts[0], opts[1], opts[2], opts[3]];
      if(q.explain) row.push(q.explain);
      return row.join(",");
    }).join("\n");
  },

      bg=await UI.compressImage(dataUrl, 900, .7);

    };
    box.querySelector("#dr-bg").onchange=async e=>{ const f=e.target.files[0]; if(f) setBg(await UI.fileToDataURL(f)); };
    // Ctrl+V 貼上（自動清理：偵測到視窗已關閉就移除監聽）
    const onPaste=async e=>{
      if(!document.getElementById("dr-prev")){ document.removeEventListener("paste", onPaste); return; }
      const items=(e.clipboardData||{}).items||[];
      for(const it of items){
        if(it.type&&it.type.indexOf("image")===0){ const f=it.getAsFile(); if(f){ e.preventDefault(); await setBg(await UI.fileToDataURL(f)); UI.toast("已貼上剪貼簿圖片","ok"); return; } }
      }

    // 按鈕貼上（navigator.clipboard.read）
    box.querySelector("#dr-paste").onclick=async()=>{
      try{
        if(!navigator.clipboard||!navigator.clipboard.read){ UI.toast("此瀏覽器不支援按鈕貼上，請改用 Ctrl+V","err"); return; }
        const items=await navigator.clipboard.read();

    };
    box.querySelector("#dr-cancel").onclick=()=>{ cleanup(); UI.closeModal(); };

  launchReading(preset){
    const p=preset||{passage:"",questions:[]};
    const lines=(p.questions&&p.questions.length)?this.readingToLines(p.questions):"";
    const LV=[["extract","直接提取"],["infer","直接推論"],["interpret","詮釋整合"],["evaluate","比較評估"]];
    const box=UI.modal(`
      <h3 style="margin:0 0 10px;font-weight:900">📚 閱讀測驗（PIRLS）</h3>
      <div class="glass" style="padding:12px;margin-bottom:10px">
        <div style="font-weight:800;font-size:13.5px;margin-bottom:8px">✨ AI 生成 <span class="hint" style="font-weight:500">模型：${esc(AIService.modelLabel())}</span></div>
        <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px">
          <label style="display:flex;align-items:center;gap:6px;font-weight:700;font-size:13.5px"><input type="radio" name="rd-mode" value="topic" checked> 只給主題（生成文本＋題目）</label>
          <label style="display:flex;align-items:center;gap:6px;font-weight:700;font-size:13.5px"><input type="radio" name="rd-mode" value="passage"> 用下方文本（只生成題目）</label>
        </div>
        <div id="rd-ai-topic-row" style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
          <div style="flex:1;min-width:160px"><label class="lbl" style="margin-top:0">主題</label><input class="field" id="rd-ai-topic" placeholder="例如：台灣黑面琵鷺的生態"></div>
          <div><label class="lbl" style="margin-top:0">文本字數</label><input class="field num" id="rd-ai-words" type="number" min="50" max="1200" step="50" value="250" style="width:110px"></div>
        </div>
        <label class="lbl">閱讀理解四層次題數</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
          ${LV.map(([k,n])=>`<label style="display:flex;align-items:center;justify-content:space-between;gap:6px;font-size:13px;font-weight:600;background:rgba(255,255,255,.55);padding:5px 9px;border-radius:9px">${n}<input class="field num rd-lv" data-k="${k}" type="number" min="0" max="5" value="1" style="width:54px;padding:4px"></label>`).join("")}
        </div>
        <button class="btn btn-grad btn-sm" id="rd-ai-go" style="margin-top:10px;width:100%">✨ AI 生成</button>
      </div>
      <label class="lbl">文章</label>
      <textarea class="field" id="rd-passage" rows="6">${esc(p.passage)}</textarea>
      <label class="lbl">題目（每行一題；格式：題目,正確答案(1-4 或 A-D),選項1,選項2,選項3,選項4,題目解析(選填)）</label>
      <textarea class="field" id="rd-qs" rows="6" placeholder="本文主旨為何?,A,黑面琵鷺的保育,台南小吃介紹,候鳥遷徙路線,濕地風景描寫,因全文聚焦於黑面琵鷺保育">${esc(lines)}</textarea>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm" id="rd-bank">📦 從題庫選</button>
        <button class="btn btn-ghost btn-sm" id="rd-save">💾 存入題庫</button>
        <span style="flex:1"></span>
        <button class="btn btn-ghost" id="rd-cancel">取消</button><button class="btn btn-grad" id="rd-go">發送</button></div>`,{wide:true});
    // AI 生成的題目以「物件」為準保存——因題目/選項/解析常含逗號，
    // 直接以行格式回存再重新解析會把含逗號的題目誤切而遺失。textarea 未經手動修改時直接採用原物件。
    let aiQs=(p.questions&&p.questions.length)?p.questions:null, aiSnap=lines;
    const read=()=>{
      const txt=box.querySelector("#rd-qs").value;
      const questions=(aiQs && txt===aiSnap) ? aiQs : this.parseReadingLines(txt);
      return {passage:box.querySelector("#rd-passage").value.trim(), questions};
    };
    const syncMode=()=>{ const m=box.querySelector("input[name=rd-mode]:checked").value;
      box.querySelector("#rd-ai-topic-row").style.display=m==="topic"?"flex":"none"; };
    box.querySelectorAll("input[name=rd-mode]").forEach(r=>r.onchange=syncMode); syncMode();
    box.querySelector("#rd-ai-go").onclick=async()=>{
      const m=box.querySelector("input[name=rd-mode]:checked").value;
      const lv={}; let total=0;
      box.querySelectorAll(".rd-lv").forEach(i=>{ const n=Math.max(0,Math.min(5,Number(i.value)||0)); lv[i.dataset.k]=n; total+=n; });
      if(total<1){ UI.toast("四層次題數總和至少要 1 題","err"); return; }
      const topic=box.querySelector("#rd-ai-topic").value.trim();
      const passage=box.querySelector("#rd-passage").value.trim();
      if(m==="topic"&&!topic){ UI.toast("請輸入主題","err"); return; }
      if(m==="passage"&&!passage){ UI.toast("請先在下方貼上閱讀文本","err"); return; }
      const btn=box.querySelector("#rd-ai-go"); btn.disabled=true; btn.textContent="AI 生成中…";
      try{
        const lvDesc=`直接提取 ${lv.extract} 題、直接推論 ${lv.infer} 題、詮釋整合 ${lv.interpret} 題、比較評估 ${lv.evaluate} 題`;
        const shape=`每題 4 個選項。回傳純 JSON：{"passage":"短文","questions":[{"question":"題目","options":["甲","乙","丙","丁"],"answer":正解索引(0-3),"explain":"題目解析"},…]}`;
        let prompt;
        if(m==="topic"){
          const words=Number(box.querySelector("#rd-ai-words").value)||250;
          prompt=`為主題「${topic}」寫一篇約 ${words} 字的繁體中文短文，並依 PIRLS 閱讀理解四層次出單選題（${lvDesc}）。${shape}`;
        }else{
          prompt=`閱讀以下繁體中文短文，依 PIRLS 閱讀理解四層次出單選題（${lvDesc}）。${shape}（passage 欄回傳原短文即可）\n\n短文：\n${passage}`;
        }
        const res=await AIService.generateJSON(prompt);
        if(m==="topic"&&res.passage) box.querySelector("#rd-passage").value=res.passage;
        const qs=(res.questions||[]).map(q=>({question:q.question||q.q, options:q.options||[], answer:q.answer, explain:q.explain||""}))
          .filter(q=>q.question&&Array.isArray(q.options)&&q.options.length>=2&&q.answer>=0&&q.answer<q.options.length);
        if(!qs.length) throw new Error("AI 未產生有效題目");
        box.querySelector("#rd-qs").value=this.readingToLines(qs);
        aiQs=qs; aiSnap=box.querySelector("#rd-qs").value;   // 以物件為準，避免含逗號題目於重新解析時遺失
        UI.toast(`AI 已生成 ${qs.length} 題`,"ok");
      }catch(e){ UI.toast("AI 生成失敗："+e.message,"err"); }
      btn.disabled=false; btn.textContent="✨ AI 生成";
    };
    box.querySelector("#rd-cancel").onclick=()=>UI.closeModal();
    box.querySelector("#rd-bank").onclick=()=>this.pickFromBank("reading", d=>this.launchReading(d));
    box.querySelector("#rd-save").onclick=()=>{ const d=read(); if(!d.passage||!d.questions.length){UI.toast("文章與題目必填","err");return;} Bank.add("reading",d); UI.toast("已存入題庫","ok"); };
    box.querySelector("#rd-go").onclick=()=>{
      const d=read();
      if(!d.passage||!d.questions.length){ UI.toast("文章與題目必填（題目格式錯誤或為空）","err"); return; }
      UI.closeModal(); this.send("reading",d);
    };
  },

      localStorage.setItem("ctp_weburl_"+State.roomCode, JSON.stringify({url, html}));
      UI.closeModal(); this.send("weburl",{url, html:url?"":html});
    };

  /* ---------- AI 出題 Modal ---------- */
  aiGenerate(type, onAdopt){
    const names={choice:"選擇題",ordering:"排序題",matching:"配對題"};
    const box=UI.modal(`
      <h3 style="margin:0 0 6px;font-weight:900">✨ AI 生成${names[type]}</h3>
      <p class="hint" style="margin:0 0 10px">目前模型：${esc(AIService.modelLabel())}</p>
      <label class="lbl">主題 / 要求</label>
      <input class="field" id="ai-topic" placeholder="例如：國小五年級自然科——水的三態">
      <div id="ai-preview" style="margin-top:12px"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px">
        <button class="btn btn-ghost" id="ai-cancel">取消</button>
        <button class="btn btn-grad" id="ai-gen">生成</button>
        <button class="btn btn-grad hidden" id="ai-adopt">採用</button></div>`);
    let result=null;
    const prompts={
      choice:t=>`為主題「${t}」出一題繁體中文單選題。回傳純 JSON：{"question":"題目","options":["甲","乙","丙","丁"],"answer":正解索引(0-3)}`,
      ordering:t=>`為主題「${t}」出一題繁體中文排序題（3~6 個項目，需有明確先後/大小順序）。回傳純 JSON：{"question":"題目說明","items":["依正確順序排列的項目1","項目2",…]}`,
      matching:t=>`為主題「${t}」出一題繁體中文配對題（3~5 組）。回傳純 JSON：{"question":"題目說明","pairs":[{"l":"左項","r":"對應右項"},…]}`
    };
    const gen=async()=>{
      const t=box.querySelector("#ai-topic").value.trim();
      if(!t){ UI.toast("請輸入主題","err"); return; }
      const g=box.querySelector("#ai-gen"); g.disabled=true; g.textContent="生成中…";
      try{
        result=await AIService.generateJSON(prompts[type](t));
        const pv=box.querySelector("#ai-preview");
        if(type==="choice") pv.innerHTML=`<div class="glass" style="padding:12px"><b>${esc(result.question)}</b>${result.options.map((o,i)=>`<div style="margin-top:5px">${String.fromCharCode(65+i)}. ${esc(o)} ${result.answer===i?"✅":""}</div>`).join("")}</div>`;
        else if(type==="ordering") pv.innerHTML=`<div class="glass" style="padding:12px"><b>${esc(result.question)}</b><div style="margin-top:5px">${result.items.map(esc).join(" → ")}</div></div>`;
        else if(type==="matching") pv.innerHTML=`<div class="glass" style="padding:12px"><b>${esc(result.question)}</b>${result.pairs.map(x=>`<div style="margin-top:5px">${esc(x.l)} ↔ ${esc(x.r)}</div>`).join("")}</div>`;
        else pv.innerHTML=`<div class="glass" style="padding:12px;max-height:240px;overflow:auto"><p style="white-space:pre-wrap">${esc(result.passage)}</p>${result.questions.map((q,i)=>`<div style="margin-top:8px"><b>${i+1}. ${esc(q.q)}</b>${q.options.map((o,j)=>`<div>${String.fromCharCode(65+j)}. ${esc(o)} ${q.answer===j?"✅":""}</div>`).join("")}</div>`).join("")}</div>`;
        box.querySelector("#ai-adopt").classList.remove("hidden");
        g.textContent="🔄 重新生成";
      }catch(e){ UI.toast("AI 生成失敗："+e.message,"err"); g.textContent="生成"; }
      g.disabled=false;
    };
    box.querySelector("#ai-gen").onclick=gen;
    box.querySelector("#ai-topic").onkeydown=e=>{ if(e.key==="Enter") gen(); };
    box.querySelector("#ai-cancel").onclick=()=>UI.closeModal();
    box.querySelector("#ai-adopt").onclick=()=>{ UI.closeModal(); onAdopt(result); };
  },

      <div style="text-align:right;margin-top:14px"><button class="btn btn-grad" onclick="document.getElementById('shell-modal-root').classList.remove('show')">關閉</button></div>`);
  },

  /* ---------- 同儕互評 ---------- */
  async startPeerReview(){
    // 互評進行中 → 停止並還原原互動
    if(this.control?.mode==="peerreview"){
      const prev=this.control.payload?.prev;
      if(prev) await FS.setDoc(this.ctrlRef(), prev);
      else await FS.setDoc(this.ctrlRef(), {mode:null, payload:{}, paused:false, round:String(Date.now())});
      UI.toast("互評已停止，學生回到原互動模式","ok");
      return;
    }
    const cur=this.control;
    if(!cur||!["drawing","text"].includes(cur.mode)){ UI.toast("互評功能只支援文字題和繪圖題！","err"); return; }
    const rs=this.curResponses();
    if(!rs.length){ UI.toast("目前沒有學生作答，無法開始互評","err"); return; }
    if(!await UI.confirm(`以目前 ${rs.length} 件作品開始同儕互評？每位學生最多可投 3 票。`)) return;
    // 只存作品的索引（id/姓名/類型），不內嵌圖片——否則繪圖作品的 dataURL 會讓控制文件超出 Firestore 1MB 上限，
    // 導致寫入失敗、學生收不到互評狀態。實際內容由師生兩端各自從 responses 取得。
    const works=rs.map(r=>{
      const v=r.value;
      const isImg=cur.mode==="drawing"||(v&&v.t==="img");
      return {id:r.id, name:r.name, kind:isImg?"img":"text"};
    });
    // 清空舊投票
    const vs=await FS.getDocs(this.voteCol());
    const batch=FS.writeBatch(State.db); vs.docs.forEach(d=>batch.delete(d.ref)); await batch.commit();
    // prev 保存原互動（停止互評時還原，學生回到原模式且保留已提交狀態）
    const prev={mode:cur.mode, payload:cur.payload||{}, paused:cur.paused||false, round:cur.round};
    await FS.setDoc(this.ctrlRef(), {mode:"peerreview", payload:{works, prev}, paused:false, round:String(Date.now())});
    UI.toast("同儕互評已開始","ok");
  },

  /** 取得互評作品的實際內容（從本機 responses 解析，避免內嵌進控制文件） */
  peerWorkValue(w){
    const r=(this.responses||[]).find(x=>x.id===w.id);
    if(!r) return null;
    const v=r.value;
    return (v&&v.t)?v.v:v;
  },

  peerVoteCounts(){
    const counts={};
    Object.values(this.votes).forEach(v=>(v.workIds||[]).forEach(id=>counts[id]=(counts[id]||0)+1));
    return counts;
  },

  renderPeerWall(body){
    const works=this.control?.payload?.works||[];
    const counts=this.peerVoteCounts();
    const sorted=[...works].sort((a,b)=>(counts[b.id]||0)-(counts[a.id]||0));
    const shown=this.starOnly?sorted.filter(w=>(counts[w.id]||0)>0):sorted;
    body.innerHTML=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap">
      <span style="font-weight:800">🌟 作品牆（已收 ${Object.keys(this.votes).length} 位投票，依票數排序）</span>
      <button class="btn btn-danger btn-sm" id="peer-stop">⏹ 停止互評</button></div>
      <div class="thumb-grid">`+shown.map(w=>{ const val=this.peerWorkValue(w);
      return `<div class="thumb-card">
        ${w.kind==="img"?(val?`<img src="${val}" data-zoom="1">`:`<div style="min-height:80px;display:flex;align-items:center;justify-content:center;color:var(--ink2);font-size:12px">載入中…</div>`):`<div style="min-height:80px;font-size:13px;padding:6px;text-align:left">${esc(val??"")}</div>`}
        <div class="nm">${esc(w.name)} — ⭐×<span class="num">${counts[w.id]||0}</span></div>
      </div>`;}).join("")+`</div>`;
    const stop=body.querySelector("#peer-stop");
    if(stop) stop.onclick=()=>this.startPeerReview();
    this.bindZoomAndStars(body);
  },

  /* ================= 學生端 ================= */
  mountStudent(c){
    c.innerHTML=`<div class="stu-wrap" id="tools-stu" style="position:relative"></div>`;
    this._lastRound=null; this._sent=false;
    this.listen(false);
  },

  renderStudent(){
    const wrap=$("tools-stu"); if(!wrap) return;
    // 預設窄欄版面（weburl／繪圖會自行放寬以最大化呈現）
    wrap.style.maxWidth=""; wrap.style.paddingBottom=""; wrap.style.height="";
    const c=this.control;
    if(!c||!c.mode){
      wrap.innerHTML=`<div class="glass stu-q-title">👀 等待老師發送互動…</div>`;
      return;
    }
    if(c.round!==this._lastRound){ this._lastRound=c.round; this._sent=false; this._result=null; }
    const p=c.payload||{};
    const q=p.question?`<div class="glass stu-q-title">${esc(p.question)}</div>`:"";

    if(this._sent && c.mode!=="weburl" && c.mode!=="sticky" && c.mode!=="wordcloud" && c.mode!=="peerreview"){
      // 有標準答案的題型（選擇/閱讀/排序/配對）→ 顯示答題結果與解析
      const hasResult=(c.mode==="choice"&&!p.simple)||["reading","ordering","matching"].includes(c.mode);
      if(hasResult && this._result) this.renderStudentResult(wrap, c);
      else wrap.innerHTML=q+`<div class="glass sent-overlay">✅ 已送出！<div style="font-size:14px;color:var(--ink2);margin-top:6px">等待老師下一步…</div></div>`;

      return;
    }

    const R={
      truefalse:()=>{
        wrap.innerHTML=q+`
          <button class="stu-big-btn" style="background:linear-gradient(135deg,#22C55E,#16A34A)" data-v="0">⭕ 是</button>

      },
      choice:()=>{
        if(p.simple){
          // 無題目快問快答：1~4 大色塊按鈕

            <button class="stu-big-btn num" data-v="${i}" style="background:${c2};padding:34px;font-size:36px">${i+1}</button>`).join("")}</div>`;
          wrap.querySelectorAll("[data-v]").forEach(b=>b.onclick=()=>this.submit(Number(b.dataset.v)));
          return;
        }
        // 自訂多題：全部作答後一次送出
        const qs=p.questions||[];
        const answers=new Array(qs.length).fill(null);
        wrap.innerHTML=`<div id="ch-qs">${qs.map((qq,i)=>`
          <div class="glass" style="padding:14px;margin-bottom:10px">
            <div style="font-weight:800;margin-bottom:8px">${i+1}. ${esc(qq.question)}</div>
            ${qq.options.map((o,j)=>`<button class="stu-opt-btn" data-q="${i}" data-o="${j}" style="margin-bottom:6px;font-size:15px;padding:12px 13px">
              <span class="tag" style="flex:0 0 30px;height:30px">${String.fromCharCode(65+j)}</span>${esc(o)}</button>`).join("")}
          </div>`).join("")}</div>
          <button class="stu-big-btn" id="ch-send" style="background:linear-gradient(135deg,var(--tools-a),var(--tools-b))">送出全部答案 ✉️</button>`;
        wrap.querySelectorAll("[data-q]").forEach(b=>{
          b.onclick=()=>{
            const qi=Number(b.dataset.q);
            answers[qi]=Number(b.dataset.o);
            wrap.querySelectorAll(`[data-q="${qi}"]`).forEach(x=>x.classList.toggle("sel",x===b));
          };
        });
        $("ch-send").onclick=()=>{
          if(answers.some(a=>a===null)){ UI.toast("還有題目未作答","err"); return; }
          this._result={answers:[...answers]};
          this.submit(answers);
        };
      },
      quickpoll:()=>{
        const opts=p.options||[];
        const big=["emoji","rating5"].includes(p.pollType)||opts.every(o=>o.length<=2);
        if(big){
          wrap.innerHTML=q+`<div style="display:grid;grid-template-columns:repeat(${Math.min(opts.length,5)},1fr);gap:10px">
            ${opts.map((o,i)=>`<button class="stu-big-btn" data-v="${i}" style="background:linear-gradient(135deg,var(--tools-a),var(--tools-b));padding:22px 6px;font-size:${p.pollType==="emoji"?"38px":"24px"}">${esc(o)}</button>`).join("")}</div>
            ${p.anonymous?'<p class="hint" style="text-align:center">🙈 匿名投票，老師看不到你的姓名</p>':""}`;
        }else{
          wrap.innerHTML=q+opts.map((o,i)=>`
            <button class="stu-opt-btn" data-v="${i}"><span class="tag">${String.fromCharCode(65+i)}</span>${esc(o)}</button>`).join("")
            +(p.anonymous?'<p class="hint" style="text-align:center">🙈 匿名投票，老師看不到你的姓名</p>':"");
        }
        wrap.querySelectorAll("[data-v]").forEach(b=>b.onclick=()=>this.submit(Number(b.dataset.v)));
      },
      text:()=>{
        wrap.innerHTML=q+`<textarea class="field" id="stu-text" rows="4" placeholder="輸入你的回答…" style="font-size:17px"></textarea>
          <button class="stu-big-btn btn-grad" id="stu-send" style="background:linear-gradient(135deg,var(--tools-a),var(--tools-b))">送出</button>`;
        $("stu-send").onclick=()=>{ const v=$("stu-text").value.trim(); if(!v){UI.toast("請輸入內容","err");return;} this.submit(v); };
      },
      wordcloud:()=>{
        wrap.innerHTML=q+`<input class="field" id="stu-text" maxlength="30" placeholder="輸入關鍵詞（可用逗號分隔多個）" style="font-size:17px;padding:14px">
          <div class="hint" style="text-align:right;margin:0"><span class="num" id="wc-cnt">0</span> / 30 字</div>
          <button class="stu-big-btn" id="stu-send" style="background:linear-gradient(135deg,var(--tools-a),var(--tools-b))">送出</button>
          <p class="hint" style="text-align:center">可重複送出，新的會覆蓋舊的</p>`;
        $("stu-text").oninput=()=>{ $("wc-cnt").textContent=$("stu-text").value.length; };
        $("stu-send").onclick=()=>{ const v=$("stu-text").value.trim(); if(!v){UI.toast("請輸入內容","err");return;} this.submit(v,{keepOpen:true}); $("stu-text").value=""; $("wc-cnt").textContent="0"; };
      },
      sticky:()=>{
        // 文字 / 圖片 兩種便利貼（沿用原 01 分頁設計）
        wrap.innerHTML=q+`
          <div style="display:flex;gap:8px">
            <button class="btn btn-grad btn-sm" id="stk-tab-t" style="flex:1">✏️ 文字</button>
            <button class="btn btn-ghost btn-sm" id="stk-tab-i" style="flex:1">🖼️ 圖片</button>
          </div>
          <div id="stk-text-sec">
            <textarea class="field" id="stu-text" rows="3" maxlength="100" placeholder="寫下你的便利貼…" style="font-size:17px"></textarea>
            <div class="hint" style="text-align:right;margin:0"><span class="num" id="stk-cnt">0</span> / 100 字</div>
          </div>
          <div id="stk-img-sec" class="hidden">
            <input type="file" id="stk-img" accept="image/*" class="hidden">
            <div style="display:flex;gap:8px">
              <button class="btn btn-ghost" id="stk-pick" style="flex:1">🖼️ 選擇圖片</button>
              <button class="btn btn-ghost" id="stk-cam" style="flex:1">📷 拍照</button>
            </div>

          </div>
          <button class="stu-big-btn" id="stu-send" style="background:linear-gradient(135deg,#F59E0B,#FBBF24)">🗒️ 貼上牆</button>`;
        let tab="t", imgData=null;
        const setTab=t=>{ tab=t;
          $("stk-tab-t").className="btn btn-sm "+(t==="t"?"btn-grad":"btn-ghost");
          $("stk-tab-i").className="btn btn-sm "+(t==="i"?"btn-grad":"btn-ghost");
          $("stk-text-sec").classList.toggle("hidden",t!=="t");
          $("stk-img-sec").classList.toggle("hidden",t!=="i"); };
        $("stk-tab-t").onclick=()=>setTab("t");
        $("stk-tab-i").onclick=()=>setTab("i");
        $("stu-text").oninput=()=>{ $("stk-cnt").textContent=$("stu-text").value.length; };
        $("stk-pick").onclick=()=>{ $("stk-img").removeAttribute("capture"); $("stk-img").click(); };
        $("stk-cam").onclick=()=>{ $("stk-img").setAttribute("capture","environment"); $("stk-img").click(); };
        $("stk-img").onchange=async e=>{
          const f=e.target.files[0]; if(!f) return;
          imgData=await UI.compressImage(await UI.fileToDataURL(f), 480, .65);
          $("stk-prev").innerHTML=`<img src="${imgData}" style="max-width:100%;border-radius:10px">`;
        };
        $("stu-send").onclick=()=>{
          if(tab==="t"){
            const v=$("stu-text").value.trim(); if(!v){UI.toast("請輸入內容","err");return;}
            this.submit({t:"text",v},{keepOpen:true,multi:true}); $("stu-text").value=""; $("stk-cnt").textContent="0";
          }else{
            if(!imgData){UI.toast("請先選擇圖片","err");return;}
            this.submit({t:"img",v:imgData},{keepOpen:true,multi:true}); imgData=null; $("stk-prev").innerHTML=""; $("stk-img").value="";
          }
          UI.toast("已貼上！可以再貼一張","ok");
        };
      },
      buzzer:()=>{
        // 隨機位置的搶答按鈕（沿用原 01「快點我」設計）
        const left=Math.random()*55+5, top=Math.random()*45+8;
        wrap.innerHTML=`
          <div class="glass stu-q-title" id="buzz-status">搶答開始！快點擊按鈕！</div>
          <div id="buzz-area" style="position:relative;height:52vh">
            <button id="stu-buzz" style="position:absolute;left:${left}%;top:${top}%;width:160px;height:160px;border-radius:50%;
              background:radial-gradient(circle at 35% 30%,#FBBF24,#EF4444);color:#fff;font-size:26px;font-weight:900;
              box-shadow:0 10px 28px rgba(239,68,68,.45);animation:popIn .25s">快點我</button>
          </div>`;
        $("stu-buzz").onclick=()=>{
          this.submit(1,{keepOpen:true,silent:true});
          this._buzzMine=this.control.round;
          $("buzz-status").textContent="🎉 你搶答成功了！";
          $("stu-buzz").disabled=true; $("stu-buzz").style.filter="grayscale(.8)";
        };
      },
      drawing:()=>this.renderStudentDraw(wrap, q, p),
      audio:()=>this.renderStudentAudio(wrap, q),
      focus:()=>this.renderStudentFocus(wrap, p),
      ordering:()=>this.renderStudentOrdering(wrap, q, p),
      matching:()=>this.renderStudentMatching(wrap, q, p),
      reading:()=>this.renderStudentReading(wrap, p),
      weburl:()=>{
        // 新派送時用浮動提示一閃即逝，不佔畫面
        if(this._weburlToastRound!==c.round){ this._weburlToastRound=c.round; UI.toast("🌐 老師派送了內容","info"); }
        // 放寬版面，內容最大化呈現
        wrap.style.maxWidth="none"; wrap.style.paddingBottom="0";
        const frameStyle="width:100%;height:82vh;border:none;border-radius:12px;background:#fff;box-shadow:0 4px 18px rgba(15,23,42,.12)";

          wrap.innerHTML=`
            <div style="display:flex;gap:8px;margin-bottom:8px">
              <button class="btn btn-grad btn-sm" id="wu-full" style="flex:1">⛶ 全螢幕觀看</button>

          $("stu-html-frame").srcdoc=p.html||"";

        this.submit("opened",{keepOpen:true,silent:true});

    };
    (R[c.mode]||(()=>{ wrap.innerHTML=q+`<div class="glass sent-overlay">未知的互動模式</div>`; }))();
    this.applyPause(wrap, c);
  },

  /** 派送網頁全螢幕觀看（覆蓋整個視窗，可關閉） */
  openWebFullscreen({url, html}){
    const old=document.getElementById("ctp-web-fs"); if(old) old.remove();
    const ov=document.createElement("div");
    ov.id="ctp-web-fs";
    ov.style.cssText="position:fixed;inset:0;z-index:400;background:#fff;display:flex;flex-direction:column";
    ov.innerHTML=`
      <div style="flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:8px 12px;background:#0F172A;color:#fff">
        <span style="font-size:18px">🌐</span>
        <span style="flex:1;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(url||"老師派送的內容")}</span>
        ${url?`<a class="btn btn-ghost btn-sm" style="color:#fff;text-decoration:none" href="${esc(url)}" target="_blank" rel="noopener">↗ 新分頁</a>`:""}
        <button class="btn btn-danger btn-sm" id="ctp-web-fs-close">✕ 關閉</button>
