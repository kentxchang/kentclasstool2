<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>剛好學-整合版課堂互動整合工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#F1F5F9; --ink:#1E293B; --ink2:#64748B;
  --tools-a:#3B82F6; --tools-b:#8B5CF6;
  --wb-a:#F97316; --wb-b:#FACC15;
  --ppt-a:#10B981; --ppt-b:#06B6D4;
  --mode-a:var(--tools-a); --mode-b:var(--tools-b);
  --glass:rgba(255,255,255,.65); --glass-bd:rgba(255,255,255,.8);
  --radius:16px; --shadow:0 8px 24px rgba(30,41,59,.10);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{margin:0; font-family:'Noto Sans TC','Inter',sans-serif; background:
  radial-gradient(1200px 600px at 10% -10%, rgba(59,130,246,.12), transparent 60%),
  radial-gradient(1000px 500px at 95% 0%, rgba(139,92,246,.10), transparent 55%),
  var(--bg); color:var(--ink); display:flex; flex-direction:column; overflow:hidden}
body[data-mode="whiteboard"]{--mode-a:var(--wb-a); --mode-b:var(--wb-b)}
body[data-mode="presentation"]{--mode-a:var(--ppt-a); --mode-b:var(--ppt-b)}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
input,textarea,select{font-family:inherit; font-size:14px; color:var(--ink)}
.num{font-family:'Inter','Noto Sans TC',sans-serif}
.hidden{display:none!important}

/* ===== 共用元件 ===== */
.glass{background:var(--glass); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  border:1px solid var(--glass-bd); border-radius:var(--radius); box-shadow:var(--shadow)}
.btn{display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:9px 18px;
  border-radius:12px; font-weight:700; font-size:14px; transition:transform .12s, box-shadow .12s, filter .12s; white-space:nowrap}
.btn:active{transform:scale(.95)}
.btn:hover{filter:brightness(1.06); box-shadow:0 4px 14px rgba(30,41,59,.18)}
.btn-grad{background:linear-gradient(135deg,var(--mode-a),var(--mode-b)); color:#fff}
.btn-ghost{background:rgba(255,255,255,.7); border:1px solid rgba(148,163,184,.4); color:var(--ink)}
.btn-danger{background:#EF4444; color:#fff}
.btn-sm{padding:5px 12px; font-size:12.5px; border-radius:9px}
.btn:disabled{opacity:.45; cursor:not-allowed; filter:none}
.field{width:100%; padding:9px 12px; border:1.5px solid #CBD5E1; border-radius:10px; background:rgba(255,255,255,.85); outline:none; transition:border-color .15s}
.field:focus{border-color:var(--mode-a)}
.lbl{display:block; font-size:12.5px; font-weight:700; color:var(--ink2); margin:10px 0 4px}
.grad-text{background:linear-gradient(135deg,var(--mode-a),var(--mode-b)); -webkit-background-clip:text; background-clip:text; color:transparent}
.badge{display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:700}
.badge-green{background:#DCFCE7; color:#15803D}
.badge-gray{background:#E2E8F0; color:#475569}
.badge-amber{background:#FEF3C7; color:#B45309}
.badge-red{background:#FEE2E2; color:#B91C1C}
.badge-blue{background:#DBEAFE; color:#1D4ED8}
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:999px;background:rgba(255,255,255,.7);border:1px solid rgba(148,163,184,.35);font-weight:800;font-size:14px}

/* ===== 頂部列 ===== */
#shell-topbar{flex:0 0 auto; display:flex; align-items:center; gap:12px; padding:10px 16px;
  background:rgba(255,255,255,.72); backdrop-filter:blur(14px); border-bottom:1px solid rgba(148,163,184,.25); z-index:50}
#shell-logo{font-size:18px; font-weight:900; letter-spacing:.5px; display:flex; align-items:center; gap:8px}
#shell-logo .dot{width:12px;height:12px;border-radius:4px;background:linear-gradient(135deg,var(--mode-a),var(--mode-b));transition:background .4s}
#shell-room-chip{cursor:pointer}
#shell-room-chip .code{font-family:'Inter';letter-spacing:2px;color:var(--mode-a)}
#shell-topbar .spacer{flex:1}
#shell-conn-dot{width:9px;height:9px;border-radius:50%;background:#94A3B8}
#shell-conn-dot.on{background:#22C55E; box-shadow:0 0 6px #22C55E}
/* 學生全螢幕沉浸：隱藏頂部列、最大化內容 */
body.stu-fullscreen #shell-topbar{display:none}
body.stu-fullscreen #shell-module{padding:8px}

/* ===== 模式分頁 ===== */
#shell-tabs{flex:0 0 auto; display:flex; gap:8px; padding:8px 16px 0; z-index:40}
.shell-tab{padding:9px 22px; border-radius:12px 12px 0 0; font-weight:800; font-size:14.5px; color:var(--ink2);
  background:rgba(255,255,255,.4); border:1px solid rgba(148,163,184,.25); border-bottom:none; transition:all .2s}
.shell-tab.active{color:#fff; background:linear-gradient(135deg,var(--ta),var(--tb)); box-shadow:0 -2px 12px rgba(30,41,59,.12)}
.shell-tab[data-m="tools"]{--ta:var(--tools-a);--tb:var(--tools-b)}
.shell-tab[data-m="whiteboard"]{--ta:var(--wb-a);--tb:var(--wb-b)}
.shell-tab[data-m="presentation"]{--ta:var(--ppt-a);--tb:var(--ppt-b)}

/* ===== 主內容 ===== */
#shell-main{flex:1; position:relative; overflow:hidden; display:flex; flex-direction:column}
#shell-module{flex:1; overflow:auto; padding:14px 16px; animation:fadeIn .35s}
@keyframes fadeIn{from{opacity:0; transform:translateY(6px)}to{opacity:1; transform:none}}
#shell-transition{position:absolute; inset:0; z-index:60; display:flex; align-items:center; justify-content:center;
  background:rgba(241,245,249,.85); backdrop-filter:blur(8px); animation:fadeIn .25s}
#shell-transition .box{font-size:22px; font-weight:900; padding:22px 40px}

/* ===== 入口畫面 ===== */
#shell-entry{flex:1; display:flex; align-items:center; justify-content:center; padding:20px}
.entry-card{width:min(720px,94vw); padding:34px 30px; text-align:center}
.entry-card h1{font-size:30px; font-weight:900; margin:0 0 4px; line-height:1.25}
.entry-card .sub{color:var(--ink2); font-size:14px; margin-bottom:24px}
.role-row{display:flex; gap:18px}
.role-btn{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
  padding:34px 18px; border-radius:20px; color:#fff; transition:transform .15s, box-shadow .15s; text-align:center; min-height:170px}
.role-btn:hover{transform:translateY(-3px); box-shadow:0 14px 30px rgba(30,41,59,.25)}
.role-btn:active{transform:scale(.98)}
.role-btn .ic{font-size:54px; line-height:1}
.role-btn .t{font-size:24px; font-weight:900}
.role-btn .d{font-size:13px; font-weight:500; opacity:.92}
.entry-credit{margin-top:20px; padding-top:16px; border-top:1px solid rgba(148,163,184,.3); font-size:13px; color:var(--ink2); font-weight:700}
.entry-credit a{color:var(--tools-a); font-weight:800; text-decoration:none}
.entry-credit a:hover{text-decoration:underline}
.entry-credit .cc{font-size:11.5px; font-weight:500; line-height:1.6; margin-top:6px; color:var(--ink2)}
@media (max-width:560px){ .role-row{flex-direction:column} .role-btn{min-height:120px; padding:22px 16px} }

/* ===== 設定面板 Drawer ===== */
#shell-drawer-mask{position:fixed; inset:0; background:rgba(15,23,42,.35); z-index:90; opacity:0; pointer-events:none; transition:opacity .25s}
#shell-drawer{position:fixed; top:0; right:0; bottom:0; width:min(400px,92vw); z-index:95; overflow-y:auto;
  background:rgba(248,250,252,.95); backdrop-filter:blur(18px); border-left:1px solid rgba(148,163,184,.3);
  box-shadow:-12px 0 32px rgba(15,23,42,.18); transform:translateX(105%); transition:transform .28s cubic-bezier(.4,0,.2,1); padding:18px}
body.drawer-open #shell-drawer{transform:none}
body.drawer-open #shell-drawer-mask{opacity:1; pointer-events:auto}
.drawer-sec{margin-bottom:16px; padding:14px}
.drawer-sec h3{margin:0 0 10px; font-size:15px; font-weight:900; display:flex; align-items:center; gap:7px}
.cfg-row{display:flex; align-items:center; gap:8px; margin-bottom:7px}
.cfg-row label{flex:0 0 96px; font-size:12px; font-weight:700; color:var(--ink2)}
.cfg-row input{flex:1; padding:7px 10px; font-size:12.5px}
.code-view{font-family:'Inter',monospace; font-size:11.5px; background:#0F172A; color:#7DD3FC; border-radius:10px; padding:10px 12px; white-space:pre-wrap; word-break:break-all; line-height:1.6}
.hint{font-size:12px; color:var(--ink2); line-height:1.6; margin-top:8px}

/* ===== Modal / Toast ===== */
#shell-modal-root{position:fixed; inset:0; z-index:200; display:none; align-items:center; justify-content:center; background:rgba(15,23,42,.45); backdrop-filter:blur(4px); padding:16px}
#shell-modal-root.show{display:flex}
#shell-modal-box{width:min(560px,96vw); max-height:88vh; overflow-y:auto; padding:20px; animation:popIn .22s}
#shell-modal-box.wide{width:min(880px,96vw)}
@keyframes popIn{from{opacity:0; transform:scale(.92)}to{opacity:1; transform:none}}
#shell-toast-root{position:fixed; top:64px; left:50%; transform:translateX(-50%); z-index:300; display:flex; flex-direction:column; gap:8px; align-items:center; pointer-events:none}
.toast{padding:10px 22px; border-radius:999px; color:#fff; font-weight:700; font-size:14px; box-shadow:0 8px 20px rgba(15,23,42,.25); animation:popIn .2s}
.toast.ok{background:#16A34A}.toast.err{background:#DC2626}.toast.info{background:#334155}

/* ===== 互動工具模式 ===== */
/* 互動工具：全畫面功能圖卡選單 + 進行中互動視圖 */
#tools-cards-view{height:100%; display:flex; flex-direction:column; min-height:0}
.tools-cards-head{display:flex; align-items:center; gap:8px; padding:2px 2px 12px; flex-wrap:wrap}
.tools-card-grid{flex:1; overflow-y:auto; display:grid; grid-template-columns:repeat(auto-fill,minmax(195px,1fr)); gap:14px; align-content:start; padding:2px 2px 16px}
.tool-card{position:relative; display:flex; flex-direction:column; gap:7px; padding:20px 16px; border-radius:18px;
  background:rgba(255,255,255,.78); border:1.5px solid rgba(255,255,255,.85); box-shadow:var(--shadow); cursor:pointer;
  transition:transform .15s, box-shadow .15s, border-color .15s; text-align:left; min-height:138px}
.tool-card:hover{transform:translateY(-4px); box-shadow:0 14px 30px rgba(30,41,59,.2); border-color:var(--tools-a)}
.tool-card:active{transform:scale(.98)}
.tool-card .ic{font-size:40px; line-height:1}
.tool-card .nm{font-size:17px; font-weight:900}
.tool-card .ds{font-size:11.5px; color:var(--ink2); font-weight:500; line-height:1.5; flex:1}
.tool-card .ai-tag{position:absolute; top:12px; right:12px; font-size:10px; background:linear-gradient(135deg,var(--tools-a),var(--tools-b)); color:#fff; padding:2px 8px; border-radius:99px; font-weight:800}
#tools-active-view{height:100%; min-height:0; display:flex}
#tools-active-view .tools-wall{flex:1}
.tools-layout{display:grid; grid-template-columns:300px 1fr; gap:14px; height:100%; min-height:0}
.tools-menu{overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px}
.tools-mode-card{display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:12px; background:rgba(255,255,255,.75);
  border:1.5px solid transparent; font-weight:700; font-size:14px; text-align:left; transition:all .15s; width:100%}
.tools-mode-card:hover{border-color:var(--tools-a); transform:translateX(3px)}
.tools-mode-card.active{background:linear-gradient(135deg,var(--tools-a),var(--tools-b)); color:#fff}
.tools-mode-card .ic{font-size:20px; width:26px; text-align:center}
.tools-mode-card .ai-tag{margin-left:auto; font-size:10px; background:rgba(139,92,246,.15); color:#7C3AED; padding:2px 7px; border-radius:99px; font-weight:800}
.tools-mode-card.active .ai-tag{background:rgba(255,255,255,.25); color:#fff}
.tools-wall{display:flex; flex-direction:column; min-height:0; padding:14px}
.tools-wall-head{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:10px}
.tools-wall-body{flex:1; overflow-y:auto; min-height:0}
.resp-item{display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:11px; background:rgba(255,255,255,.8); margin-bottom:7px; animation:fadeIn .3s}
.resp-item .nm{font-weight:800; flex:0 0 auto}
.resp-item .val{flex:1; word-break:break-word}
.resp-item .star{font-size:18px; opacity:.35; transition:.15s}
.resp-item .star.on{opacity:1}
.bar-row{display:flex; align-items:center; gap:8px; margin-bottom:8px}
.bar-row .bl{flex:0 0 80px; font-weight:700; font-size:13px; text-align:right}
.bar-row .bt{flex:1; height:26px; background:rgba(148,163,184,.18); border-radius:8px; overflow:hidden}
.bar-row .bf{height:100%; background:linear-gradient(90deg,var(--tools-a),var(--tools-b)); border-radius:8px; transition:width .4s; min-width:2px}
.bar-row .bn{flex:0 0 40px; font-weight:800}
.sticky-wall{display:flex; flex-wrap:wrap; gap:10px; align-content:flex-start}
.sticky-note{width:150px; min-height:110px; padding:10px; border-radius:4px 14px 4px 14px; font-size:13px; font-weight:600;
  box-shadow:2px 3px 8px rgba(15,23,42,.15); transform:rotate(var(--rot,-1deg)); word-break:break-word; animation:popIn .25s}
.thumb-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px}
.thumb-card{padding:8px; border-radius:12px; background:rgba(255,255,255,.85); text-align:center; animation:popIn .25s}
.thumb-card img{width:100%; border-radius:8px; background:#fff; cursor:zoom-in}
.thumb-card .nm{font-size:12.5px; font-weight:800; margin-top:5px}
.wordcloud-box{display:flex; flex-wrap:wrap; gap:12px 18px; align-items:center; justify-content:center; padding:24px}
.wordcloud-box span{font-weight:900; animation:popIn .3s; line-height:1.1}

/* 學生作答 */
.stu-wrap{max-width:560px; margin:0 auto; display:flex; flex-direction:column; gap:14px; padding-bottom:90px}
.stu-q-title{font-size:20px; font-weight:900; text-align:center; padding:18px 16px}
.stu-big-btn{padding:22px; border-radius:18px; font-size:22px; font-weight:900; color:#fff; transition:transform .12s; box-shadow:0 6px 18px rgba(15,23,42,.15)}
.stu-big-btn:active{transform:scale(.96)}
.stu-opt-btn{display:flex; align-items:center; gap:12px; padding:16px 18px; border-radius:14px; background:rgba(255,255,255,.85);
  border:2px solid rgba(148,163,184,.3); font-size:17px; font-weight:700; text-align:left; transition:.15s; width:100%}
.stu-opt-btn:not(:disabled):hover{border-color:var(--tools-a)}
.stu-opt-btn.sel{border-color:var(--tools-a); background:linear-gradient(135deg,rgba(59,130,246,.12),rgba(139,92,246,.12))}
.stu-opt-btn .tag{flex:0 0 34px; height:34px; display:flex; align-items:center; justify-content:center; border-radius:10px;
  background:linear-gradient(135deg,var(--tools-a),var(--tools-b)); color:#fff; font-weight:900}
.pause-overlay{position:absolute; inset:0; z-index:30; background:rgba(241,245,249,.78); backdrop-filter:blur(6px);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; font-size:20px; font-weight:900; color:var(--ink2)}
.sent-overlay{text-align:center; padding:40px 16px; font-size:22px; font-weight:900; color:#16A34A; animation:popIn .3s}
.sortable-item{display:flex; align-items:center; gap:10px; padding:13px 14px; border-radius:12px; background:rgba(255,255,255,.9);
  border:1.5px solid rgba(148,163,184,.35); font-weight:700; margin-bottom:8px; user-select:none; cursor:grab}
.sortable-item.dragging{opacity:.4}
.sortable-item .hd{color:var(--ink2); cursor:grab; font-size:18px}
.match-col{display:flex; flex-direction:column; gap:8px; flex:1}
.match-item{padding:12px; border-radius:12px; background:rgba(255,255,255,.9); border:2px solid rgba(148,163,184,.35); font-weight:700; text-align:center; transition:.15s}
.match-item.sel{border-color:var(--tools-a); background:rgba(59,130,246,.1)}
.match-item.done{border-color:#16A34A; background:#DCFCE7; color:#15803D}

/* ===== 白板模式 ===== */
.wb-layout{position:relative; height:100%; min-height:0; display:flex; flex-direction:column; border-radius:var(--radius); overflow:hidden}
#wb-canvas-wrap{position:relative; flex:1; min-height:0; background:#fff; overflow:hidden; touch-action:none; border-radius:0 0 var(--radius) var(--radius)}
#wb-canvas, #wb-overlay{position:absolute; inset:0}
.wb-toolbar{position:absolute; left:10px; top:50%; transform:translateY(-50%); z-index:20; display:grid; grid-template-columns:repeat(2,38px); gap:4px; padding:7px; max-height:88%; overflow-y:auto; overflow-x:hidden; align-content:start}
.wb-toolbar .span2{grid-column:1/-1}
.wb-tool{width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:17px; transition:.15s; background:rgba(255,255,255,.6)}
.wb-tool:hover{background:rgba(249,115,22,.14)}
.wb-tool.active{background:linear-gradient(135deg,var(--wb-a),var(--wb-b)); color:#fff; box-shadow:0 3px 10px rgba(249,115,22,.4)}
.wb-topbar{flex:0 0 auto; display:flex; align-items:center; gap:8px; padding:7px 10px; background:rgba(255,255,255,.85); border-bottom:1px solid rgba(148,163,184,.25); flex-wrap:wrap}
.wb-page-tab{padding:4px 10px; border-radius:8px; font-size:12.5px; font-weight:800; background:rgba(148,163,184,.15); border:1.5px solid transparent; cursor:pointer}
.wb-page-tab.active{border-color:var(--wb-a); background:#FFF7ED; color:#C2410C}
#wb-side{position:absolute; right:0; top:0; bottom:0; width:230px; z-index:25; background:rgba(255,255,255,.92); backdrop-filter:blur(10px);
  border-left:1px solid rgba(148,163,184,.3); padding:12px; transform:translateX(100%); transition:transform .25s; overflow-y:auto}
#wb-side.open{transform:none}
.wb-color{width:26px; height:26px; border-radius:50%; border:2.5px solid transparent; cursor:pointer}
.wb-color.active{border-color:var(--ink)}
#wb-ctxmenu{position:fixed; z-index:120; min-width:150px; padding:6px; display:none}
#wb-ctxmenu button{display:block; width:100%; text-align:left; padding:7px 12px; border-radius:8px; font-size:13.5px; font-weight:600}
#wb-ctxmenu button:hover{background:rgba(249,115,22,.12)}

/* ===== 簡報模式 ===== */
.ppt-layout{display:grid; grid-template-columns:180px 1fr 280px; gap:12px; height:100%; min-height:0}
.ppt-thumbs{overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:8px}
.ppt-thumb{position:relative; border-radius:10px; border:2.5px solid transparent; overflow:hidden; cursor:pointer; background:#fff; aspect-ratio:16/9; flex:0 0 auto}
.ppt-thumb.active{border-color:var(--ppt-a)}
.ppt-thumb .no{position:absolute; left:5px; top:4px; font-size:11px; font-weight:900; background:rgba(15,23,42,.55); color:#fff; padding:1px 7px; border-radius:99px}
.ppt-thumb img{width:100%; height:100%; object-fit:cover}
.ppt-stage-wrap{display:flex; flex-direction:column; min-height:0; gap:10px}
#ppt-stage{position:relative; flex:1; min-height:0; border-radius:var(--radius); overflow:hidden; background:#0F172A; display:flex; align-items:center; justify-content:center}
#ppt-stage .slide{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background-size:contain; background-position:center; background-repeat:no-repeat}
#ppt-stage iframe{width:100%; height:100%; border:none; background:#fff}
#ppt-annot{position:absolute; inset:0; z-index:10; touch-action:none}
#ppt-laser{position:absolute; width:18px; height:18px; border-radius:50%; background:radial-gradient(circle,#EF4444 30%,rgba(239,68,68,.25) 70%); z-index:15; pointer-events:none; transform:translate(-50%,-50%); display:none}
.ppt-ctrl{display:flex; align-items:center; gap:8px; padding:9px 12px; flex-wrap:wrap}
.ppt-submits{overflow-y:auto; padding:12px; display:flex; flex-direction:column; min-height:0}
.ppt-side-title{font-weight:900; font-size:14px; margin-bottom:8px}

@keyframes pulse-sync{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.5)}50%{box-shadow:0 0 0 7px rgba(16,185,129,0)}}
.ppt-left{display:flex; flex-direction:column; min-height:0; gap:8px}
/* 教師端最大化預覽：收合左右側欄、隱藏頂部標題列與模式分頁 */
body.ppt-maxed #shell-topbar, body.ppt-maxed #shell-tabs{display:none}
body.ppt-maxed #shell-module{padding:6px}
.ppt-layout.ppt-max{grid-template-columns:1fr}
.ppt-layout.ppt-max .ppt-thumbs, .ppt-layout.ppt-max .ppt-left, .ppt-layout.ppt-max .ppt-submits{display:none}

  .tools-layout{grid-template-columns:1fr; grid-template-rows:auto 1fr}

  background:rgba(255,255,255,.9); backdrop-filter:blur(12px); border-top:1px solid rgba(148,163,184,.3)}

  font-size:20px; font-weight:900; transition:.1s}

::-webkit-scrollbar-thumb{background:rgba(100,116,139,.35); border-radius:99px}
</style>

<body data-mode="tools">

<!-- 頂部列 -->
<header id="shell-topbar">
  <div id="shell-logo"><span class="dot"></span><span><span class="grad-text">剛好學</span>·課堂互動整合工具</span></div>
  <div id="shell-room-chip" class="chip hidden" title="查看教室資訊">🏫 <span class="code" id="shell-room-code"></span></div>
  <div class="spacer"></div>
  <span id="shell-conn-dot" title="Firebase 連線狀態"></span>
  <span id="shell-online-chip" class="chip hidden" style="font-size:12.5px">👥 <span id="shell-online-n" class="num">0</span></span>
  <button class="btn btn-ghost btn-sm hidden" id="shell-btn-leave">🚪 下課 / 離開</button>
  <button class="btn btn-ghost btn-sm" id="shell-btn-settings">⚙ 設定</button>
  <button class="btn btn-ghost btn-sm" id="shell-btn-help">?</button>
</header>

<!-- 模式分頁（教師） -->
<nav id="shell-tabs" class="hidden">
  <button class="shell-tab active" data-m="tools">🧩 互動工具</button>
  <button class="shell-tab" data-m="whiteboard">🖌️ 白板</button>
  <button class="shell-tab" data-m="presentation">📽️ 簡報</button>
</nav>

<!-- 主內容 -->
<main id="shell-main">
  <div id="shell-entry"></div>
  <div id="shell-module" class="hidden"></div>
</main>

<!-- 設定面板 -->
<div id="shell-drawer-mask"></div>
<aside id="shell-drawer">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <h2 style="margin:0;font-size:18px;font-weight:900">⚙ 設定</h2>
    <button class="btn btn-ghost btn-sm" id="shell-drawer-close">✕ 關閉</button>
  </div>

  <section class="drawer-sec glass">
    <h3>🔥 Firebase 連線設定 <span id="cfg-source-badge" class="badge badge-gray">尚未設定</span></h3>
    <div style="margin-bottom:8px"><span id="cfg-conn-badge" class="badge badge-gray">未連線</span></div>
    <div class="cfg-row"><label>API 金鑰</label><input class="field cfg-secret" type="password" id="cfg-apiKey" placeholder="apiKey"></div>
    <div class="cfg-row"><label>驗證網域</label><input class="field cfg-secret" type="password" id="cfg-authDomain" placeholder="authDomain"></div>
    <div class="cfg-row"><label>專案 ID</label><input class="field cfg-secret" type="password" id="cfg-projectId" placeholder="projectId"></div>
    <div class="cfg-row"><label>儲存空間</label><input class="field cfg-secret" type="password" id="cfg-storageBucket" placeholder="storageBucket"></div>
    <div class="cfg-row"><label>訊息發送者 ID</label><input class="field cfg-secret" type="password" id="cfg-messagingSenderId" placeholder="messagingSenderId"></div>
    <div class="cfg-row"><label>應用程式 ID</label><input class="field cfg-secret" type="password" id="cfg-appId" placeholder="appId"></div>
    <label style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--ink2);margin-top:6px">
      <input type="checkbox" id="cfg-show-secret"> 顯示設定值</label>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn btn-grad btn-sm" id="cfg-apply" style="flex:1">套用設定</button>
      <button class="btn btn-ghost btn-sm" id="cfg-clear" style="flex:1">清除設定</button>
    </div>
    <label class="lbl">貼上快速輸入</label>
    <textarea class="field" id="cfg-json-paste" rows="3" placeholder='貼上完整 firebaseConfig JSON，或直接貼六行 "鍵": "值"，自動拆解填入上方欄位'></textarea>
    <button class="btn btn-ghost btn-sm" id="cfg-json-parse" style="margin-top:6px;width:100%">解析並填入</button>
  </section>

  <section class="drawer-sec glass">
    <h3>📄 原始碼硬編碼設定（唯讀）</h3>
    <div class="code-view" id="cfg-hardcode-view"></div>
    <p class="hint">若你直接編輯本檔案原始碼最上方的 <b>MASTER_FIREBASE_CONFIG</b>，其優先序高於上方網頁設定。適合自己架設、固定使用同一專案的老師。</p>
  </section>

  <section class="drawer-sec glass">
    <h3>✨ AI 生成設定</h3>
    <label class="lbl">Gemini API 金鑰（選填）</label>
    <input class="field" id="ai-key" type="password" placeholder="留空 = 免 Key 模式">
    <div id="ai-free-badge" class="badge badge-blue" style="margin-top:7px">✨ 免 Key 模式（使用 Gemini 2.5 Flash）</div>
    <label class="lbl">模型選擇</label>
    <select class="field" id="ai-model"></select>
    <button class="btn btn-grad btn-sm" id="ai-save" style="margin-top:10px;width:100%">儲存 AI 設定</button>
  </section>

  <section class="drawer-sec glass" id="drawer-roominfo-sec">
    <h3>🏫 教室資訊</h3>
    <div id="drawer-roominfo-body"><p class="hint">尚未進入教室。</p></div>
  </section>

  <div style="text-align:center;margin-top:4px">
    <button class="btn btn-ghost btn-sm" id="shell-btn-manual">📖 使用說明</button>
  </div>
</aside>

<!-- Modal / Toast -->
<div id="shell-modal-root"><div id="shell-modal-box" class="glass"></div></div>
<div id="shell-toast-root"></div>
<script type="module">
/* =====================================================================
 * 課堂工具一體化平台 — 單檔應用
 * 結構：主設定常數 → Core Services → App Shell → 三大模組 → 啟動流程
 * ===================================================================== */
import { initializeApp, deleteApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, initializeFirestore, doc, collection, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp, writeBatch, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ========================= 主設定常數 =========================
 * 在此直接填入你的 Firebase 專案設定（硬編碼），其優先序高於網頁設定面板。
 * 保持示範值（demo）時，視為「未設定」，會改用網頁面板填寫的設定。
 */
const MASTER_FIREBASE_CONFIG = {
  apiKey: "demo",
  authDomain: "demo.firebaseapp.com",
  projectId: "demo",
  storageBucket: "demo.appspot.com",
  messagingSenderId: "demo",
  appId: "demo"
};

const CFG_KEYS = ["apiKey","authDomain","projectId","storageBucket","messagingSenderId","appId"];
const TEACHER_PASS = "tpet";   // 教師入口密碼（可自行於原始碼修改）
const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const rand = a => a[Math.floor(Math.random()*a.length)];
const sleep = ms => new Promise(r=>setTimeout(r,ms));

/* ========================= 全域狀態 ========================= */
const State = {
  app:null, db:null, auth:null, uid:null, connected:false,
  role:null, name:"", roomCode:"", currentMode:"tools",
  unsubs:[], moduleUnsubs:[]
};

/* ========================= ConfigService ========================= */
const ConfigService = {
  LS_KEY: "ctp_firebase_config",
  isValid(cfg){ return !!(cfg && cfg.apiKey && cfg.projectId && cfg.apiKey!=="demo" && cfg.projectId!=="demo" && cfg.apiKey.length>10); },
  getHardcoded(){
    // Gemini Canvas 注入的 __firebase_config 視同硬編碼來源（最高優先）
    // 優先使用你在原始碼硬編碼的 MASTER（即使在 Gemini Canvas 中也一樣）——
    // 這樣 Canvas 與「直接開啟 html」才會連到同一個 Firebase 專案，教室代碼才找得到對方。
    if(this.isValid(MASTER_FIREBASE_CONFIG)) return {cfg:MASTER_FIREBASE_CONFIG, canvas:false};
    try{ if(typeof __firebase_config!=="undefined" && __firebase_config){ const c=JSON.parse(__firebase_config); if(this.isValid(c)) return {cfg:c, canvas:true}; } }catch(e){}
    return null;
  },
  getStored(){
    try{ const c=JSON.parse(localStorage.getItem(this.LS_KEY)||"null"); return this.isValid(c)?c:null; }catch(e){ return null; }
  },
  getUrlConfig(){
    try{
      const p=new URLSearchParams(location.search).get("cfg");
      if(!p) return null;
      const c=JSON.parse(decodeURIComponent(escape(atob(p))));
      return this.isValid(c)?c:null;
    }catch(e){ return null; }
  },
  /** 有效設定與來源：硬編碼 > 網址帶入 > 網頁設定 */
  getEffective(){
    const hc=this.getHardcoded();
    if(hc) return {cfg:hc.cfg, source:hc.canvas?"canvas":"hardcode"};
    const url=this.getUrlConfig();
    if(url){ try{ localStorage.setItem(this.LS_KEY, JSON.stringify(url)); }catch(e){} return {cfg:url, source:"url"}; }
    const st=this.getStored();
    if(st) return {cfg:st, source:"web"};
    return {cfg:null, source:"none"};
  },
  save(cfg){ localStorage.setItem(this.LS_KEY, JSON.stringify(cfg)); },
  clear(){ localStorage.removeItem(this.LS_KEY); },
  appId(){
    const eff=this.getEffective();
    // 使用「你自己的 Firebase 專案」（硬編碼 / 網址帶入 / 網頁設定）時，路徑一律以 projectId 為準，
    // 不使用 Canvas 注入的 __app_id——否則 Canvas 端與直接開啟 html 端會存到不同路徑而找不到教室。
    if(eff.cfg && eff.source!=="canvas") return eff.cfg.projectId;
    // 純 Canvas 環境（未硬編碼自己的設定）才沿用 Canvas 的 __app_id 以符合其資料隔離。
    try{ if(typeof __app_id!=="undefined" && __app_id) return __app_id; }catch(e){}
    return (eff.cfg && eff.cfg.projectId) ? eff.cfg.projectId : "classroom-platform";
  }
};

/* ========================= FirebaseService ========================= */
const Fire = {
  _initPromise:null,
  _activeCfgKey:null,
  _reconnectBound:false,
  /** 防併發：同時多處呼叫 init 共用同一個連線過程，避免 deleteApp 終止使用中的 Firestore */
  init(opts={}){
    if(this._initPromise) return this._initPromise;
    this._initPromise=this._doInit(opts).finally(()=>{ this._initPromise=null; });
    return this._initPromise;
  },
  /** 帶逾時的登入：iPad 剛載入時網路常還沒就緒，signInAnonymously 可能卡住或失敗，逾時可轉為可重試 */
  _signIn(source){
    const p = (source==="canvas" && typeof __initial_auth_token!=="undefined" && __initial_auth_token)
      ? signInWithCustomToken(State.auth, __initial_auth_token).catch(()=>signInAnonymously(State.auth))
      : signInAnonymously(State.auth);
    return Promise.race([p, new Promise((_,rej)=>setTimeout(()=>rej(new Error("登入逾時")), 8000))]);
  },
  async _doInit(opts={}){
    const {quiet=false}=opts;
    const {cfg, source} = ConfigService.getEffective();
    const cfgKey=cfg?JSON.stringify(cfg):null;
    // 設定未變更且已連線 → 直接沿用現有連線
    if(cfg && State.connected && State.app && this._activeCfgKey===cfgKey){
      UI.renderCfgBadges(source, true);
      return true;
    }
    UI.renderCfgBadges(source, false);
    if(!cfg){ State.connected=false; $("shell-conn-dot").classList.remove("on"); return false; }
    try{
      if(State.app){ try{ await deleteApp(State.app); }catch(e){} State.app=null; State.connected=false; }
      State.app = initializeApp(cfg, "ctp-"+Date.now());
      // iPad / iOS Safari + 部分校園/公共 WiFi 會擋掉或破壞 Firestore 預設的 WebChannel 串流連線
      //（症狀：重新載入時好時壞、換一個 WiFi 就連得上）。這裡「強制使用長輪詢」(force long-polling)：
      // 改用一般 HTTPS 請求輪詢，幾乎不會被網路環境阻擋，是這類間歇性連不上最可靠的解法。
      try{
        State.db = initializeFirestore(State.app, {
          experimentalForceLongPolling: true,
          useFetchStreams: false
        });
      }catch(e){
        // 同一 app 若已初始化過 Firestore 會丟錯，退回 getFirestore 取既有實例
        State.db = getFirestore(State.app);
      }
      State.auth = getAuth(State.app);
      // 登入重試：iPad 從 QR 開啟時，WiFi 常還在連線中，第一次登入易失敗；
      // 這裡自動重試數次（間隔遞增），網路一就緒就能連上，使用者不必切換 WiFi 或重新整理。
      let cred=null, lastErr=null;
      for(let attempt=0; attempt<3; attempt++){
        try{ cred=await this._signIn(source); break; }
        catch(e){ lastErr=e; if(attempt<2) await sleep(1500*(attempt+1)); }
      }
      if(!cred) throw lastErr||new Error("登入失敗");
      State.uid = cred.user.uid;
      State.connected = true;
      this._activeCfgKey = cfgKey;
      $("shell-conn-dot").classList.add("on");
      UI.renderCfgBadges(source, true);
      this.bindAutoReconnect();
      return true;
    }catch(e){
      console.error("Firebase init failed", e);
      State.connected=false;
      $("shell-conn-dot").classList.remove("on");
      UI.renderCfgBadges(source, false);
      this.bindAutoReconnect();   // 即使失敗也掛上監聽：網路一恢復就自動重連
      if(!quiet) UI.toast("Firebase 連線失敗："+(e.message||e.code||e), "err");
      return false;
    }
  },
  /** 網路恢復 / 分頁返回前景時，若尚未連線就自動重試（免使用者切換 WiFi 或重新整理） */
  bindAutoReconnect(){
    if(this._reconnectBound) return; this._reconnectBound=true;
    const retry=()=>{
      if(State.connected) return;
      if(!ConfigService.getEffective().cfg) return;
      this.init({quiet:true}).then(ok=>{ if(ok){ UI.toast("✅ 已重新連線","ok",1800); try{ Shell.refreshConnHint(); }catch(e){} } });
    };
    window.addEventListener("online", retry);
    document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="visible") retry(); });
    window.addEventListener("pageshow", e=>{ if(e.persisted) retry(); });   // Safari 從前後快取(bfcache)還原
  },
  roomDoc(...seg){ return doc(State.db, "artifacts", ConfigService.appId(), "public", "data", "rooms", State.roomCode, ...seg); },
  roomCol(...seg){ return collection(State.db, "artifacts", ConfigService.appId(), "public", "data", "rooms", State.roomCode, ...seg); },
  roomRootDoc(){ return doc(State.db, "artifacts", ConfigService.appId(), "public", "data", "rooms", State.roomCode); }
};
// 讓模組共用 Firestore API
const FS = { doc, collection, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp, writeBatch, increment };

/* ========================= AIService（免 Key 機制） ========================= */
const aiSettings = { geminiApiKey: '', model: 'gemini-2.5-flash' };
const AI_MODELS = [
  {id:"gemini-2.5-flash", name:"Gemini 2.5 Flash（推薦）"},
  {id:"gemini-2.5-pro", name:"Gemini 2.5 Pro"},
  {id:"gemini-2.5-flash-lite", name:"Gemini 2.5 Flash-Lite"},
  {id:"gemini-2.0-flash", name:"Gemini 2.0 Flash"}
];
const AIService = {
  LS_KEY:"ctp_ai_settings",
  load(){
    try{ const s=JSON.parse(localStorage.getItem(this.LS_KEY)||"null"); if(s){ aiSettings.geminiApiKey=s.geminiApiKey||''; aiSettings.model=s.model||'gemini-2.5-flash'; } }catch(e){}
  },
  save(){ localStorage.setItem(this.LS_KEY, JSON.stringify(aiSettings)); },
  effectiveModel(){ return aiSettings.geminiApiKey ? aiSettings.model : "gemini-2.5-flash"; },
  modelLabel(){ return this.effectiveModel() + (aiSettings.geminiApiKey ? "" : "（免 Key 模式）"); },
  getApiUrl(model, apiKey){
    if(!apiKey){
      // 免 Key：裸端點 + 強制 gemini-2.5-flash，由 Gemini Canvas 平台自動附加金鑰
      return "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent";
    }
    return `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
  },
  async callAi(payload, apiKey = aiSettings.geminiApiKey){
    const url = this.getApiUrl(this.effectiveModel(), apiKey);
    let lastErr;
    for(let i=0;i<3;i++){
      try{
        const res = await fetch(url, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload)});
        if(!res.ok){
          if(res.status===429 || res.status>=500){ lastErr=new Error("HTTP "+res.status); await sleep(800*(i+1)); continue; }
          const t = await res.text();
          throw new Error("AI 請求失敗 ("+res.status+")："+t.slice(0,200));
        }
        const data = await res.json();
        const text = data?.candidates?.[0]?.content?.parts?.map(p=>p.text||"").join("") || "";
        if(!text) throw new Error("AI 回傳內容為空");
        return text;
      }catch(e){ lastErr=e; if(String(e.message).includes("AI 請求失敗")) throw e; await sleep(600*(i+1)); }
    }
    throw lastErr || new Error("AI 呼叫失敗");
  },
  /** 產生 JSON 結果（自動剝除 markdown code fence 並解析） */
  async generateJSON(prompt){
    const text = await this.callAi({ contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:0.8} });
    const m = text.match(/```(?:json)?\s*([\s\S]*?)```/);
    const raw = m ? m[1] : text;
    const start = raw.indexOf(raw.trim()[0]==="["?"[":"{");
    return JSON.parse(raw.slice(start).trim());
  },
  async generateText(prompt){
    return await this.callAi({ contents:[{parts:[{text:prompt}]}] });
  }
};

/* ========================= UIService ========================= */
const UI = {
  toast(msg, type="info", ms=2600){
    const el=document.createElement("div");
    el.className="toast "+(type==="ok"?"ok":type==="err"?"err":"info");
    el.textContent=msg;
    $("shell-toast-root").appendChild(el);
    setTimeout(()=>{ el.style.opacity="0"; el.style.transition="opacity .3s"; setTimeout(()=>el.remove(),320); }, ms);
  },
  modal(html, {wide=false, onClose=null}={}){
    const root=$("shell-modal-root"), box=$("shell-modal-box");
    box.className="glass"+(wide?" wide":"");
    box.innerHTML=html;
    root.classList.add("show");
    root.onclick=(e)=>{ if(e.target===root){ this.closeModal(); onClose&&onClose(); } };
    return box;
  },
  closeModal(){ $("shell-modal-root").classList.remove("show"); $("shell-modal-box").innerHTML=""; },

  async promptMultiline(msg, def=""){

      box.querySelector("#m-no").onclick=()=>{ this.closeModal(); res(null); };
      box.querySelector("#m-yes").onclick=()=>{ const v=inp.value; this.closeModal(); res(v); };

  qr(el, text, size=170){
    el.innerHTML="";
    try{ new QRCode(el, {text, width:size, height:size, correctLevel:QRCode.CorrectLevel.M}); }
    catch(e){ el.textContent="QR 產生失敗"; }
  },
  /** 影像壓縮：回傳 dataURL（JPEG） */
  compressImage(src, maxW=800, quality=0.7){
    return new Promise((res,rej)=>{
      const img=new Image();
      img.onload=()=>{
        const sc=Math.min(1, maxW/img.width);
        const c=document.createElement("canvas");
        c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc);
        const ctx=c.getContext("2d");
        ctx.fillStyle="#fff"; ctx.fillRect(0,0,c.width,c.height);
        ctx.drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL("image/jpeg", quality));
      };
      img.onerror=rej;
      img.src=src;
    });
  },
  fileToDataURL(file){
    return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
  },
  download(filename, content, type="application/json"){
    const blob = content instanceof Blob ? content : new Blob([content],{type});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=filename; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
  },
  renderCfgBadges(source, connected){
    const sb=$("cfg-source-badge"), cb=$("cfg-conn-badge");
    const map={ hardcode:["使用原始碼內建設定","badge-amber"], canvas:["使用平台注入設定","badge-amber"], web:["使用網頁自訂設定","badge-blue"], url:["使用網址帶入設定","badge-blue"], none:["尚未設定","badge-gray"] };
    const [t,cls]=map[source]||map.none;
    sb.textContent=t; sb.className="badge "+cls;
    cb.textContent=connected?"✅ 已連線":"未連線";
    cb.className="badge "+(connected?"badge-green":"badge-gray");
  },
  showTransition(text){

    t.innerHTML=`<div class="box glass">${esc(text)}</div>`;
    $("shell-main").appendChild(t);
    setTimeout(()=>{ t.style.opacity="0"; t.style.transition="opacity .35s"; setTimeout(()=>t.remove(),360); }, 1000);
  }
};

/* ========================= PDF 工具（共用：白板插入 / 簡報匯入） ========================= */
const PdfUtil = {
  async ensureLib(){
    if(window.pdfjsLib) return;
    await new Promise((res,rej)=>{ const s=document.createElement("script");
      s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"; s.onload=res; s.onerror=rej; document.head.appendChild(s); });
    pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  },
  /** 顯示逐頁預覽勾選視窗，回傳所選頁的高解析圖 [{page,dataURL,w,h}]；取消回傳 null */
  async pickPages(file){
    await this.ensureLib();
    const pdf=await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
    // 先渲染縮圖
    const thumbs=[];
    for(let i=1;i<=pdf.numPages;i++){
      const page=await pdf.getPage(i);
      const vp=page.getViewport({scale:160/page.getViewport({scale:1}).width});
      const cv=document.createElement("canvas"); cv.width=vp.width; cv.height=vp.height;
      await page.render({canvasContext:cv.getContext("2d"), viewport:vp}).promise;
      thumbs.push(cv.toDataURL("image/jpeg",.6));
    }
    const picked=await new Promise(resolve=>{
      const box=UI.modal(`
        <h3 style="margin:0 0 8px;font-weight:900">📄 選擇要插入的 PDF 頁面 <span class="hint" style="font-weight:500">（共 ${pdf.numPages} 頁）</span></h3>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <label style="display:flex;align-items:center;gap:6px;font-weight:700;font-size:13.5px">
            <input type="checkbox" id="pp-all" checked> 全選</label>
          <span class="badge badge-blue">已選 <span class="num" id="pp-n">${pdf.numPages}</span> 頁</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;max-height:52vh;overflow:auto">
          ${thumbs.map((t,i)=>`
          <label style="position:relative;cursor:pointer;border-radius:10px;overflow:hidden;border:2.5px solid var(--mode-a);display:block" class="pp-cell" data-i="${i}">
            <img src="${t}" style="width:100%;display:block;background:#fff">
            <span style="position:absolute;left:5px;top:4px;font-size:11px;font-weight:900;background:rgba(15,23,42,.6);color:#fff;padding:1px 7px;border-radius:99px" class="num">${i+1}</span>
            <input type="checkbox" class="pp-ck" data-i="${i}" checked style="position:absolute;right:6px;top:6px;width:18px;height:18px;accent-color:var(--mode-a)">
          </label>`).join("")}
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:12px">
          <button class="btn btn-ghost" id="pp-cancel">取消</button>
          <button class="btn btn-grad" id="pp-ok">插入選取頁面</button>
        </div>`,{wide:true, onClose:()=>resolve(null)});
      const refresh=()=>{
        const cks=[...box.querySelectorAll(".pp-ck")];
        box.querySelector("#pp-n").textContent=cks.filter(c=>c.checked).length;
        cks.forEach(c=>{ c.closest(".pp-cell").style.borderColor=c.checked?"var(--mode-a)":"rgba(148,163,184,.4)";
          c.closest(".pp-cell").style.opacity=c.checked?"1":".55"; });
        box.querySelector("#pp-all").checked=cks.every(c=>c.checked);
      };
      box.querySelectorAll(".pp-ck").forEach(c=>c.onchange=refresh);
      box.querySelector("#pp-all").onchange=e=>{ box.querySelectorAll(".pp-ck").forEach(c=>c.checked=e.target.checked); refresh(); };
      box.querySelector("#pp-cancel").onclick=()=>{ UI.closeModal(); resolve(null); };
      box.querySelector("#pp-ok").onclick=()=>{
        const sel=[...box.querySelectorAll(".pp-ck")].filter(c=>c.checked).map(c=>Number(c.dataset.i)+1);
        UI.closeModal(); resolve(sel);
      };
    });
    if(!picked||!picked.length) return null;
    // 渲染所選頁高解析圖
    const out=[];
    for(const n of picked){
      const page=await pdf.getPage(n);
      const vp=page.getViewport({scale:1.3});
      const cv=document.createElement("canvas"); cv.width=vp.width; cv.height=vp.height;
      await page.render({canvasContext:cv.getContext("2d"), viewport:vp}).promise;
      out.push({page:n, dataURL:await UI.compressImage(cv.toDataURL("image/jpeg",.8), 1100, .75), w:vp.width, h:vp.height});
    }
    return out;
  }
};

/* ========================= RoomService ========================= */
const RoomService = {
  genCode(){
    const chars="ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789";
    let s=""; for(let i=0;i<6;i++) s+=rand(chars);
    return s;
  },
  roomsCol(){ return collection(State.db, "artifacts", ConfigService.appId(), "public", "data", "rooms"); },
  /** 列出尚未下課（仍存在）的教室 */
  async listRooms(){
    const snap=await getDocs(this.roomsCol());
    return snap.docs.map(d=>({code:d.id, ...d.data()}))
      .sort((a,b)=>(b.createdAt?.toMillis?.()||0)-(a.createdAt?.toMillis?.()||0));
  },
  /** 下課清空指定教室代碼的全部雲端資料 */
  async wipeRoomByCode(code){
    const appId=ConfigService.appId();
    const base=["artifacts", appId, "public", "data", "rooms", code];
    const cols=[
      ["tools","control","responses"], ["tools","control","votes"], ["tools","control","history"],
      ["whiteboard","meta","objects"],
      ["presentation","live_session","pages"], ["presentation","live_session","submissions"],
      ["participants"], ["tools"], ["whiteboard"], ["presentation"]
    ];
    for(const seg of cols){
      const snap=await getDocs(collection(State.db, ...base, ...seg));
      for(let i=0;i<snap.docs.length;i+=400){
        const batch=writeBatch(State.db);
        snap.docs.slice(i,i+400).forEach(d=>batch.delete(d.ref));
        await batch.commit();
      }
    }
    await deleteDoc(doc(State.db, ...base));
  },
  /** 每個分頁一個獨立參與者 id：同瀏覽器多分頁/異常關閉後重進都不會互相衝突 */
  pid(){
    let id=null;
    try{ id=sessionStorage.getItem("ctp_pid"); }catch(e){}
    if(!id){
      id=(State.uid||"u").slice(0,12)+"-"+Math.random().toString(36).slice(2,8);
      try{ sessionStorage.setItem("ctp_pid", id); }catch(e){}
    }
    return id;
  },
  async createOrJoin(code, asTeacher){
    State.roomCode=code;
    const ref=Fire.roomRootDoc();
    const withTimeout=(p,ms)=>Promise.race([p, new Promise((_,rej)=>setTimeout(()=>rej(new Error("連線逾時——請檢查網路與 Firebase 設定（含安全規則）")),ms))]);
    const snap=await withTimeout(getDoc(ref), 12000);
    if(!snap.exists()){
      if(!asTeacher) throw new Error("找不到此教室代碼，請確認後再試");
      await withTimeout(setDoc(ref, {currentMode:"tools", createdAt:serverTimestamp()}), 12000);
      State.currentMode="tools";
    }else{
      State.currentMode=snap.data().currentMode||"tools";
      if(asTeacher && !snap.data().currentMode) await updateDoc(ref,{currentMode:"tools"}).catch(()=>{});
    }
    // 加入在線名單 + 心跳（寫入失敗不阻擋進入教室，只提示）
    const pid=this.pid();
    const hbData=()=>({ name: State.name||(asTeacher?"老師":"同學"), role: asTeacher?"teacher":"student", lastActiveAt: serverTimestamp() });
    try{ await setDoc(Fire.roomDoc("participants", pid), hbData()); }
    catch(e){ console.warn("participant write failed", e); UI.toast("在線名單同步失敗（不影響使用）","info"); }
    this._hb=setInterval(()=>{ setDoc(Fire.roomDoc("participants", pid), hbData()).catch(()=>{}); }, 25000);
    // 關閉/重新整理頁面時盡力移除在線紀錄（異常關閉由 70 秒心跳逾時兜底）
    this._onUnload=()=>{ try{ deleteDoc(Fire.roomDoc("participants", pid)); }catch(e){} };
    window.addEventListener("pagehide", this._onUnload);
    // 監聽教室 meta（模式切換；教室被刪除 = 老師已下課）
    const unsub=onSnapshot(ref, s=>{
      if(!s.exists()){
        if(this._joined&&State.role==="student"){
          this._joined=false;
          UI.toast("📚 老師已下課，課程結束","info",2500);
          setTimeout(()=>location.reload(), 2200);
        }
        return;
      }
      this._joined=true;
      const m=s.data().currentMode||"tools";
      if(m!==State.currentMode){
        State.currentMode=m;
        Shell.onModeChanged(m, /*remote*/true);
      }
    });
    State.unsubs.push(unsub);
    // 監聽在線人數（以姓名+角色去重：異常關閉殘留的舊紀錄不會造成重複）
    const unsub2=onSnapshot(Fire.roomCol("participants"), s=>{
      const now=Date.now();
      const online=s.docs.filter(d=>{ const t=d.data().lastActiveAt; return t && (now - t.toMillis()) < 70000; });
      const seen=new Map();
      for(const d of online){
        const data=d.data();
        const key=data.role+"|"+data.name;
        const prev=seen.get(key);
        if(!prev || (data.lastActiveAt?.toMillis?.()||0) > (prev.lastActiveAt?.toMillis?.()||0)){
          seen.set(key, {id:d.id, ...data});
        }
      }
      State.participants=[...seen.values()];
      $("shell-online-n").textContent=State.participants.filter(p=>p.role==="student").length;
      $("shell-online-chip").classList.remove("hidden");
      document.dispatchEvent(new CustomEvent("ctp:participants"));
    });
    State.unsubs.push(unsub2);
  },
  async setMode(mode){
    State.currentMode=mode;
    await updateDoc(Fire.roomRootDoc(), {currentMode:mode});
  },
  /** 離開教室（不清空資料）：停止心跳、解除監聽、移除自己在線紀錄 */
  async leave(){
    if(this._hb){ clearInterval(this._hb); this._hb=null; }
    if(this._onUnload){ window.removeEventListener("pagehide", this._onUnload); this._onUnload=null; }
    this._joined=false;
    State.unsubs.forEach(u=>{ try{u();}catch(e){} });
    State.unsubs=[];
    State.moduleUnsubs.forEach(u=>{ try{u();}catch(e){} });
    State.moduleUnsubs=[];
    try{ await deleteDoc(Fire.roomDoc("participants", this.pid())); }catch(e){}
    try{ sessionStorage.removeItem("ctp_pid"); }catch(e){}
  },
  /** 下課清空：刪除本教室在 Firestore 的全部資料（先子集合、後父文件） */
  async wipeRoomData(){
    const cols=[
      ["tools","control","responses"], ["tools","control","votes"], ["tools","control","history"],
      ["whiteboard","meta","objects"],
      ["presentation","live_session","pages"], ["presentation","live_session","submissions"],
      ["participants"], ["tools"], ["whiteboard"], ["presentation"]
    ];
    for(const seg of cols){
      const snap=await getDocs(Fire.roomCol(...seg));
      for(let i=0;i<snap.docs.length;i+=400){
        const batch=writeBatch(State.db);
        snap.docs.slice(i,i+400).forEach(d=>batch.delete(d.ref));
        await batch.commit();
      }
    }
    await deleteDoc(Fire.roomRootDoc());
  },
  shareUrl(){
    const eff=ConfigService.getEffective();
    const u=new URL(location.href.split("?")[0]);
    u.searchParams.set("room", State.roomCode);
    if(eff.cfg && eff.source!=="canvas"){
      u.searchParams.set("cfg", btoa(unescape(encodeURIComponent(JSON.stringify(eff.cfg)))));
    }
    return u.toString();
  }
};

      inp.onkeydown=e=>{ if(e.key==="Enter") box.querySelector("#tpw-yes").click(); };
      box.querySelector("#tpw-no").onclick=()=>{ UI.closeModal(); res(null); };
      box.querySelector("#tpw-yes").onclick=()=>{ const v=inp.value; UI.closeModal(); res(v); };
    });
    if(pw===null) return;
    if(pw!==TEACHER_PASS){ UI.toast("教師密碼錯誤","err"); return; }
    if(!await this.ensureFirebase()) return;
    // 查詢是否有尚未下課的教室
    let rooms=[];
    try{ rooms=await RoomService.listRooms(); }catch(e){ console.warn("listRooms failed", e); }
    if(rooms.length) this.teacherRoomPicker(rooms);
    else this.teacherNewRoomDialog();
  },

  /* ---- 進入主應用 ---- */
  enterApp(){
    $("shell-entry").classList.add("hidden");
    $("shell-module").classList.remove("hidden");
    $("shell-room-code").textContent=State.roomCode;
    $("shell-room-chip").classList.remove("hidden");
    if(State.role!=="teacher"){
      // 學生：隱藏頂部列、最大化互動內容（不顯示離開鈕）
      document.body.classList.add("stu-fullscreen");
    }
    $("shell-btn-leave").classList.remove("hidden");
    $("shell-btn-leave").textContent=State.role==="teacher"?"🚪 下課 / 暫離":"🚪 離開教室";
    if(State.role==="teacher"){
      $("shell-tabs").classList.remove("hidden");
      this.bindTabs();
    }
    this.renderRoomInfo();
    this.mountModule(State.currentMode);
  },

  bindTabs(){
    document.querySelectorAll(".shell-tab").forEach(btn=>{
      btn.onclick=async()=>{
        const m=btn.dataset.m;
        if(m===State.currentMode) return;
        try{ await RoomService.setMode(m); }catch(e){ UI.toast("模式切換失敗","err"); return; }
        this.onModeChanged(m, false);
      };
    });
  },

  onModeChanged(mode, remote){
    State.currentMode=mode;
    document.querySelectorAll(".shell-tab").forEach(b=>b.classList.toggle("active", b.dataset.m===mode));
    if(remote && State.role==="student"){
      UI.showTransition(MODE_INFO[mode].tip);
      setTimeout(()=>this.mountModule(mode), 300);
    }else{
      this.mountModule(mode);
    }
  },

  mountModule(mode){
    // teardown 前一模組
    if(this.currentModule && this.currentModule.teardown) try{ this.currentModule.teardown(); }catch(e){}
    State.moduleUnsubs.forEach(u=>{ try{u();}catch(e){} });
    State.moduleUnsubs=[];
    document.body.classList.remove("ppt-fs");
    document.body.dataset.mode=mode;
    const c=$("shell-module");
    c.innerHTML="";
    c.style.animation="none"; void c.offsetWidth; c.style.animation="";
    const mod = mode==="whiteboard" ? WhiteboardModule : mode==="presentation" ? PresentationModule : ToolsModule;
    this.currentModule=mod;
    if(State.role==="teacher") mod.mountTeacher(c); else mod.mountStudent(c);
  },

    const hasKey=!!$("ai-key").value.trim();

  bindDrawer(){
    $("cfg-apply").onclick=async()=>{
      const cfg={}; CFG_KEYS.forEach(k=>cfg[k]=$("cfg-"+k).value.trim());
      if(!cfg.apiKey||!cfg.projectId||!cfg.appId){ UI.toast("apiKey / projectId / appId 為必填","err"); return; }
      if(!/^AIza/.test(cfg.apiKey)) { if(!await UI.confirm("API 金鑰格式看起來不像 Firebase Web API Key（通常以 AIza 開頭），仍要套用嗎？")) return; }
      ConfigService.save(cfg);
      UI.toast("設定已儲存，重新連線中…","info");
      const ok=await Fire.init();
      if(ok) UI.toast("✅ Firebase 已連線","ok");
      this.refreshDrawer();
    };
    $("cfg-clear").onclick=async()=>{
      if(!await UI.confirm("確定清除網頁自訂設定？將回退使用原始碼硬編碼值（若有）。")) return;
      ConfigService.clear();
      await Fire.init();
      this.refreshDrawer();
      UI.toast("已清除網頁設定","ok");
    };
    $("cfg-json-parse").onclick=()=>{
      const raw=$("cfg-json-paste").value.trim();
      if(!raw){ UI.toast("請先貼上設定（JSON 或六行鍵值）","err"); return; }
      let obj=null;
      // 1) 先試完整 JSON / JS 物件
      try{
        let t=raw; const m=t.match(/\{[\s\S]*\}/); if(m) t=m[0];
        try{ obj=JSON.parse(t); }
        catch(e){ obj=JSON.parse(t.replace(/([{,]\s*)([A-Za-z_][A-Za-z0-9_]*)\s*:/g,'$1"$2":').replace(/,\s*}/g,"}").replace(/'/g,'"')); }
      }catch(e){ obj=null; }
      // 2) 退而求其次：逐鍵抽取（支援只貼六行 "鍵": "值" 而沒有大括號）
      if(!obj || !CFG_KEYS.some(k=>obj[k])){
        obj={};
        CFG_KEYS.forEach(k=>{
          const mm=raw.match(new RegExp('["\\\']?'+k+'["\\\']?\\s*[:=]\\s*["\\\']([^"\\\',\\n]*)["\\\']'));
          if(mm) obj[k]=mm[1].trim();
        });
      }
      let n=0;
      CFG_KEYS.forEach(k=>{ if(obj[k]){ $("cfg-"+k).value=obj[k]; n++; } });
      if(n) UI.toast(`已解析填入 ${n} 個欄位，請按「套用設定」`,"ok");
      else UI.toast("解析失敗，請確認格式","err");
    };
    // 顯示/隱藏設定值
    $("cfg-show-secret").onchange=e=>{
      document.querySelectorAll(".cfg-secret").forEach(i=>i.type=e.target.checked?"text":"password");
    };
    $("ai-key").oninput=()=>this.refreshAiUi();
    $("ai-save").onclick=()=>{
      aiSettings.geminiApiKey=$("ai-key").value.trim();
      aiSettings.model=$("ai-key").value.trim()?$("ai-model").value:"gemini-2.5-flash";
      AIService.save();
      this.refreshAiUi();
      UI.toast("AI 設定已儲存（目前模型："+AIService.modelLabel()+"）","ok");
    };
    $("ai-model").onchange=()=>{ aiSettings.model=$("ai-model").value; };
  },

  /* ---- 課堂名單（點右上角人數）---- */
  showRoster(){
    const isTeacher=State.role==="teacher";
    const box=UI.modal(`
      <h3 style="margin:0 0 4px;font-weight:900">👥 課堂學生名單</h3>
      <p class="hint" style="margin:0 0 10px">在線學生 <b class="num" id="ro-count">0</b> 位</p>
      <div id="ro-names" style="display:flex;flex-wrap:wrap;gap:8px;max-height:42vh;overflow:auto;margin-bottom:12px"></div>
      ${isTeacher?`<div id="ro-pick" class="hidden" style="text-align:center;font-size:34px;font-weight:900;padding:14px" class="grad-text"></div>`:""}
      <div style="display:flex;gap:10px;justify-content:flex-end">
        ${isTeacher?`<button class="btn btn-grad" id="ro-lottery">🎲 抽人</button>`:""}
        <button class="btn btn-ghost" id="ro-close">關閉</button></div>`);
    const renderNames=(highlight)=>{
      const students=(State.participants||[]).filter(p=>p.role==="student");
      box.querySelector("#ro-count").textContent=students.length;
      box.querySelector("#ro-names").innerHTML=students.length
        ? students.map(p=>`<span class="chip" data-name="${esc(p.name)}" style="${highlight===p.name?'background:linear-gradient(135deg,var(--mode-a),var(--mode-b));color:#fff;transform:scale(1.1)':''};transition:all .15s">${esc(p.name)}</span>`).join("")
        : '<p class="hint">目前沒有在線學生</p>';
    };
    renderNames();
    // 名單即時更新
    const onParts=()=>{ if(box.isConnected) renderNames(); else document.removeEventListener("ctp:participants", onParts); };
    document.addEventListener("ctp:participants", onParts);
    box.querySelector("#ro-close").onclick=()=>{ document.removeEventListener("ctp:participants", onParts); UI.closeModal(); };
    const lot=box.querySelector("#ro-lottery");
    if(lot) lot.onclick=async()=>{
      const students=(State.participants||[]).filter(p=>p.role==="student").map(p=>p.name);
      if(!students.length){ UI.toast("目前沒有在線學生可供抽籤","err"); return; }
      lot.disabled=true;
      const pickEl=box.querySelector("#ro-pick");
      pickEl.classList.remove("hidden");
      for(let i=0;i<18;i++){
        const n=rand(students);
        pickEl.textContent=n; renderNames(n);
        await sleep(60+i*14);
      }
      const win=rand(students);
      pickEl.innerHTML=`🎉 <span class="grad-text">${esc(win)}</span>`;
      renderNames(win);
      lot.disabled=false; lot.textContent="🎲 再抽一次";
    };
  },

  /* ---- 下課 / 暫離 / 離開 ---- */
  leaveFlow(){
    if(State.role!=="teacher"){
      UI.confirm("確定離開教室？（你的作答紀錄會保留）","離開教室").then(async ok=>{
        if(!ok) return;
        await RoomService.leave();
        UI.toast("已離開教室","ok");
        setTimeout(()=>location.reload(), 600);
      });
      return;
    }
    const box=UI.modal(`
      <h3 style="margin:0 0 6px;font-weight:900">🚪 下課 / 暫離課堂</h3>
      <p class="hint" style="margin:0 0 14px">教室代碼：<b class="num">${esc(State.roomCode)}</b></p>
      <button class="role-btn" id="lv-pause" style="background:linear-gradient(135deg,#3B82F6,#06B6D4)">
        <span class="ic">⏸️</span><span>暫離課堂<div class="d">保留所有資料，之後用同一教室代碼回來繼續上課</div></span>
      </button>
      <button class="role-btn" id="lv-end" style="background:linear-gradient(135deg,#EF4444,#B91C1C)">
        <span class="ic">🏁</span><span>下課結束課程<div class="d">清空本教室在雲端資料庫的全部資料（學生端會收到下課通知）</div></span>
      </button>
      <div style="text-align:right;margin-top:6px"><button class="btn btn-ghost" id="lv-cancel">取消</button></div>`);
    box.querySelector("#lv-cancel").onclick=()=>UI.closeModal();
    box.querySelector("#lv-pause").onclick=async()=>{
      UI.closeModal();
      await RoomService.leave();
      UI.toast("已暫離課堂，資料已保留","ok");
      setTimeout(()=>location.reload(), 800);
    };
    box.querySelector("#lv-end").onclick=async()=>{
      UI.closeModal();
      if(!await UI.confirm("確定下課並清空本教室的雲端資料？此動作無法復原（本機題庫不受影響）。","🏁 下課結束課程")) return;
      // 詢問是否先下載本次上課歷程（互動工具的作答紀錄，不含白板／簡報）
      const wantLog=await UI.confirm(
        "要先下載本次上課的「互動歷程紀錄」嗎？\n會把開啟教室到現在所有互動工具的作答整理成一份 HTML 檔（不含白板與簡報）。下載後即會清空資料庫。",
        "📚 下載上課歷程");
      if(wantLog){
        const dl=UI.modal(`<div style="text-align:center;padding:20px;font-weight:900">📦 正在彙整上課歷程…</div>`);
        try{
          const {html,count,responses}=await ToolsModule.buildSessionHistory();
          const stamp=new Date().toISOString().slice(0,16).replace(/[:T]/g,"-");
          UI.download(`上課歷程_${State.roomCode||"room"}_${stamp}.html`, html, "text/html;charset=utf-8");
          UI.closeModal();
          UI.toast(`✅ 已下載歷程（${count} 回合・${responses} 則回應）`,"ok",2500);
        }catch(e){
          UI.closeModal();
          if(!await UI.confirm("彙整歷程失敗："+(e.message||e.code||e)+"\n仍要繼續下課並清空資料嗎？","⚠️ 歷程下載失敗")) return;
        }
      }
      const b=UI.modal(`<div style="text-align:center;padding:20px;font-weight:900">🧹 正在清空教室資料…</div>`);
      try{
        // 先解除模組監聽避免清空過程中重繪，再刪除資料
        State.moduleUnsubs.forEach(u=>{ try{u();}catch(e){} });
        State.moduleUnsubs=[];
        await RoomService.wipeRoomData();
        await RoomService.leave();
        UI.closeModal();
        UI.toast("✅ 已下課，教室資料已清空","ok");
        setTimeout(()=>location.reload(), 1200);
      }catch(e){
        UI.closeModal();
        UI.toast("清空失敗："+(e.message||e.code||e),"err",4000);
      }
    };

  /** 把目前回合的作答即時快照進本機歷程（隨每筆回應更新；下課下載時用本機資料，不必再讀資料庫） */
  recordHistory(){
    // 換教室就重置歷程，避免把上一堂課的資料混進來
    if(this._histRoom!==State.roomCode){ this.history=[]; this._histRoom=State.roomCode; }
    const c=this.control;
    if(!c||!c.mode||c.mode==="peerreview") return;
    const rs=this.curResponses().map(r=>({
      name:r.name, value:r.value, round:r.round,
      ts:(r.ts&&r.ts.toMillis)?r.ts.toMillis():Date.now()
    }));
    if(!rs.length) return;   // 尚無人作答的回合先不建立紀錄
    const info=TOOL_MODES.find(m=>m.id===c.mode);
    const entry={ round:c.round, mode:c.mode, name:info?.name||c.mode, icon:info?.icon||"🧩",
      payload:c.payload||{}, ts:Number(c.round)||Date.now(), responses:rs };
    const i=this.history.findIndex(h=>h.round===c.round);
    if(i>=0) this.history[i]=entry; else this.history.push(entry);
  },

  async send(mode, payload){
    const round=String(Date.now());
    await FS.setDoc(this.ctrlRef(), {mode, payload, paused:false, round});
    // 紀錄互動歷程（每回合一份），下課時可彙整下載
    try{
      const info=TOOL_MODES.find(m=>m.id===mode);
      await FS.setDoc(FS.doc(this.histCol(), round),
        {mode, name:info?.name||mode, icon:info?.icon||"🧩", payload, ts:Date.now()});
    }catch(e){ /* 歷程紀錄為輔助功能，失敗不影響互動 */ }
    UI.toast("已發送「"+(TOOL_MODES.find(m=>m.id===mode)?.name||mode)+"」給所有學生","ok");
  },
  async clearResponses(){
    const snap=await FS.getDocs(this.respCol());
    const batch=FS.writeBatch(State.db);
    snap.docs.forEach(d=>batch.delete(d.ref));
    await batch.commit();
    UI.toast("已清空回應","ok");
  },

    if(!this.control){ UI.toast("尚未發送互動","err"); return; }
    await FS.updateDoc(this.ctrlRef(), {paused:!this.control.paused});
  },

    const name=TOOL_MODES.find(m=>m.id===this.control.mode)?.name||(this.control.mode==="peerreview"?"同儕互評":this.control.mode);

    await FS.setDoc(this.ctrlRef(), {mode:null, payload:{}, paused:false, round:this.control.round});

  /** 取得本教室全部互動回合（優先用本機累積的歷程；本機沒有才退回讀資料庫） */
  async collectHistoryRounds(){
    // 1) 本機歷程（最可靠，不受連線狀態影響）
    if(this.history && this.history.length && this._histRoom===State.roomCode){
      return this.history.map(h=>({...h, responses:(h.responses||[]).slice()}));
    }
    // 2) 後備：老師曾重新載入過頁面 → 本機無資料，改讀資料庫
    const [hs, rsnap]=await Promise.all([FS.getDocs(this.histCol()), FS.getDocs(this.respCol())]);
    const hist=hs.docs.map(d=>({round:d.id,...d.data()}));
    const resp=rsnap.docs.map(d=>({id:d.id,...d.data()}));
    const byRound={};
    resp.forEach(r=>{ (byRound[r.round]=byRound[r.round]||[]).push(r); });
    const rounds=hist.map(h=>({...h, responses:byRound[h.round]||[]}));
    const known=new Set(hist.map(h=>h.round));
    Object.keys(byRound).forEach(rd=>{ if(!known.has(rd)) rounds.push({round:rd,mode:"unknown",name:"互動",icon:"🧩",payload:{},ts:Number(rd)||0,responses:byRound[rd]}); });
    return rounds;
  },

  async buildSessionHistory(){

      if(p.question) head+=`<div class="q">❓ ${esc(p.question)}</div>`;
      if(p.passage) head+=`<details class="passage"><summary>📄 閱讀文本</summary><div>${esc(p.passage)}</div></details>`;
      return `<section>${head}${this.histSectionBody(h,p,rs)}</section>`;
    }).join("");
